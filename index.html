<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
<title>The Founder's OS</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Founder's OS"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;
  --surface:#161925;
  --surface-2:#1e2233;
  --surface-3:#252a3d;
  --border:#2a3048;
  --border-hover:#3a4160;
  --text:#f1f3fa;
  --text-2:#b4bbd2;
  --muted:#7a82a0;
  --faint:#4a5072;
  --accent:#6366f1;
  --accent-2:#8b5cf6;
  --accent-3:#ec4899;
  --grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --green:#10d373;
  --red:#ff3d5f;
  --yellow:#ffb547;
  --blue:#3b9dff;
  --purple:#b668ff;
  --rmd:12px;
  --rsm:10px;
  --rxs:7px;
  --fd:'Plus Jakarta Sans',sans-serif;
  --fb:'Poppins',sans-serif;
}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  font-family:var(--fb);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  font-size:14px;
  line-height:1.5;
}
body::before{
  content:'';position:fixed;top:-20%;left:-10%;
  width:60vw;height:60vw;
  background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-20%;right:-10%;
  width:60vw;height:60vw;
  background:radial-gradient(circle,rgba(236,72,153,.05) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
input,textarea,select,button{font-family:inherit;color:inherit}
input,textarea,select{font-size:16px}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:99px}

/* ═══ MOBILE FIRST LAYOUT ═══ */
#app{min-height:100vh;min-height:100dvh;position:relative;z-index:1}

/* Sidebar: hidden off-canvas on mobile, slides in */
.sb{
  position:fixed;top:0;left:0;
  width:280px;max-width:85vw;
  height:100vh;height:100dvh;
  background:var(--surface);
  border-right:1px solid var(--border);
  transform:translateX(-100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:300;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sb.open{transform:translateX(0);box-shadow:0 20px 48px rgba(0,0,0,.5)}

.sb-brand{padding:18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{
  width:38px;height:38px;
  background:var(--grad);
  border-radius:10px;
  display:grid;place-items:center;
  color:#fff;font-family:var(--fd);
  font-weight:800;font-size:17px;
  flex-shrink:0;
  box-shadow:0 6px 16px rgba(99,102,241,.35);
}
.sb-name{font-family:var(--fd);font-size:14px;font-weight:800;line-height:1.2}
.sb-tag{font-size:10px;color:var(--muted);margin-top:2px}

.sb-nav{flex:1;padding:12px 10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sb-sec{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:1.2px;padding:12px 10px 6px}
.ni{
  display:flex;align-items:center;gap:12px;
  width:100%;
  padding:12px;
  border:none;background:none;
  border-radius:var(--rsm);
  color:var(--text-2);
  font-size:14px;font-weight:500;
  text-align:left;cursor:pointer;
  margin-bottom:2px;
  position:relative;
  min-height:44px;
}
.ni.on{
  background:linear-gradient(90deg,rgba(99,102,241,.18),rgba(139,92,246,.08));
  color:var(--text);font-weight:600;
}
.ni.on::before{
  content:'';position:absolute;left:0;top:22%;bottom:22%;
  width:3px;border-radius:0 3px 3px 0;background:var(--grad);
}
.ni-ic{font-size:17px;width:22px;display:grid;place-items:center;flex-shrink:0}
.ni-bd{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;padding:2px 8px;font-size:10px;font-weight:700}

.sb-foot{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(99,102,241,.15);
  border:1px solid rgba(99,102,241,.3);
  color:var(--accent);
  border-radius:99px;
  padding:5px 12px;
  font-size:11px;font-weight:600;
}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Main content area */
.main{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.top{
  background:rgba(22,25,37,.85);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
  position:sticky;top:0;z-index:50;
}
.top-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.ham{
  width:40px;height:40px;min-width:40px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--rsm);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--text);cursor:pointer;
  flex-shrink:0;
}
.top-title{font-family:var(--fd);font-size:16px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-date{font-size:10px;color:var(--muted);margin-top:1px}

.page{padding:16px 14px 90px;flex:1;position:relative;z-index:1}

/* Overlay */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200}
.ov.show{display:block}

/* Bottom mobile nav */
.bn{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(22,25,37,.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  z-index:150;
  padding-bottom:env(safe-area-inset-bottom,0);
  display:flex;justify-content:space-around;
  padding-top:6px;padding-left:4px;padding-right:4px;
}
.bn-b{
  flex:1;max-width:80px;
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px 8px;
  min-height:54px;
}
.bn-ic{font-size:20px;line-height:1}
.bn-l{font-size:10px;font-weight:600;color:var(--muted)}
.bn-b.on .bn-l{color:var(--accent);font-weight:700}
.bn-b.on .bn-ic{transform:scale(1.1)}

/* ═══ CARDS ═══ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rmd);
  padding:16px;
  margin-bottom:12px;
}
.card-t{
  font-family:var(--fd);
  font-size:11px;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:14px;
}

/* ═══ STAT CARDS ═══ */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rmd);
  padding:14px;
  min-width:0;
  position:relative;
  overflow:hidden;
}
.stat.hero{
  background:var(--grad);
  border:none;
  color:#fff;
}
.stat.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at top right,rgba(255,255,255,.15),transparent 60%);
  pointer-events:none;
}
.stat-l{
  font-size:10px;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.6px;
  margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.stat.hero .stat-l{color:rgba(255,255,255,.85)}
.stat-ic{
  width:22px;height:22px;
  background:var(--surface-3);
  border-radius:6px;
  display:grid;place-items:center;
  font-size:12px;flex-shrink:0;
}
.stat.hero .stat-ic{background:rgba(255,255,255,.15)}
.stat-v{
  font-family:var(--fd);
  font-size:22px;font-weight:800;
  letter-spacing:-0.7px;line-height:1;
  word-break:break-all;
}
.stat.hero .stat-v{color:#fff}
.stat-s{font-size:10px;color:var(--muted);margin-top:5px;font-weight:500}
.stat.hero .stat-s{color:rgba(255,255,255,.7)}

/* ═══ PROGRESS BAR ═══ */
.pb{background:var(--surface-3);border-radius:99px;overflow:hidden}
.pf{border-radius:99px;transition:width .6s ease;height:100%}

/* ═══ BADGES ═══ */
.bdg{
  display:inline-flex;align-items:center;gap:3px;
  border-radius:5px;
  padding:3px 8px;
  font-size:10px;font-weight:700;
  white-space:nowrap;
  border:1px solid transparent;
}

/* ═══ BUTTONS ═══ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;
  border-radius:var(--rsm);
  padding:10px 16px;
  font-size:13px;font-weight:600;
  cursor:pointer;
  font-family:var(--fb);
  white-space:nowrap;
  min-height:42px;
  transition:transform .15s;
}
.btn-p{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35)}
.btn-p:active{transform:scale(.97)}
.btn-g{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-g:active{background:var(--surface-3)}
.btn-sm{padding:7px 12px;font-size:12px;min-height:34px}
.btn-xs{padding:5px 10px;font-size:11px;min-height:28px}

/* ═══ INPUTS ═══ */
.inp{
  width:100%;
  background:var(--surface-2);
  border:1.5px solid var(--border);
  border-radius:var(--rsm);
  padding:12px 13px;
  color:var(--text);
  outline:none;
  font-family:var(--fb);
  min-height:44px;
}
.inp:focus{border-color:var(--accent);background:var(--surface-3)}
.inp::placeholder{color:var(--faint)}
textarea.inp{min-height:80px;resize:vertical;line-height:1.5}
select.inp{cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%237a82a0' d='M5 6L0 0h10z'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:30px}
.ig{margin-bottom:14px}
.il{font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}

/* ═══ PILL BUTTONS (filter tabs) ═══ */
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pil{
  padding:8px 14px;
  border-radius:var(--rsm);
  border:1.5px solid var(--border);
  background:var(--surface-2);
  color:var(--text-2);
  font-size:12px;font-weight:600;
  cursor:pointer;
  font-family:var(--fb);
  white-space:nowrap;
  min-height:36px;
  display:inline-flex;align-items:center;justify-content:center;
}
.pil.on{background:var(--grad);color:#fff;border-color:transparent}

/* ═══ MODAL ═══ */
.modal{
  position:fixed;inset:0;
  background:rgba(9,11,20,.75);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  z-index:400;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-body{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px 16px 0 0;
  padding:20px 18px;
  padding-bottom:calc(20px + env(safe-area-inset-bottom,0));
  width:100%;
  max-height:92vh;max-height:92dvh;
  overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-t{font-family:var(--fd);font-size:17px;font-weight:800}
.modal-x{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--rsm);
  width:34px;height:34px;
  display:grid;place-items:center;
  cursor:pointer;color:var(--muted);font-size:18px;
}
.modal-f{display:flex;gap:10px;margin-top:20px}
.modal-f .btn{flex:1}

/* ═══ TASK ROW (mobile optimized) ═══ */
.trow{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
}
.trow:last-child{border-bottom:none}
.tck{
  width:24px;height:24px;
  border:2px solid var(--border-hover);
  border-radius:7px;
  cursor:pointer;
  display:grid;place-items:center;
  flex-shrink:0;
  background:transparent;
  color:#fff;font-weight:800;font-size:12px;
  margin-top:2px;
}
.tck.on{background:var(--green);border-color:var(--green)}
.tmain{flex:1;min-width:0;cursor:pointer}
.ttitle{font-size:14px;font-weight:600;word-break:break-word;line-height:1.35}
.ttitle.done{text-decoration:line-through;color:var(--muted)}
.tdetails{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.tmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}
.tdel{
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:6px;
  width:28px;height:28px;
  cursor:pointer;color:var(--muted);
  display:grid;place-items:center;
  font-size:16px;
  flex-shrink:0;
  margin-top:2px;
}

/* ═══ RECURRING TAG ═══ */
.rec{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 7px;border-radius:5px;
  font-size:10px;font-weight:600;
  background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.15));
  border:1px solid rgba(139,92,246,.3);
  color:#c4a0ff;
  white-space:nowrap;
}

/* ═══ ROUTINE TIMELINE ═══ */
.tl-row{display:flex;min-height:56px;border-bottom:1px solid var(--border)}
.tl-row.now{background:linear-gradient(90deg,rgba(99,102,241,.08),transparent 50%)}
.tl-hour{
  min-width:64px;
  padding:12px 6px 0 4px;
  text-align:right;
  font-size:10.5px;font-weight:700;
  font-family:var(--fd);
  flex-shrink:0;
}
.tl-cont{
  flex:1;min-width:0;
  padding:6px 0 6px 10px;
  border-left:2px solid var(--border);
  display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;
}
.bk{
  border-radius:var(--rsm);
  padding:8px 10px;
  cursor:pointer;
  flex:1 1 130px;
  min-width:130px;
  max-width:100%;
  border:1px solid;
  border-left-width:3px;
}
.bk-t{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.25;word-break:break-word}
.bk-m{display:flex;gap:4px;align-items:center;flex-wrap:wrap}

/* ═══ FINANCE GATEWAY ROW ═══ */
.gw{
  display:grid;
  grid-template-columns:1.3fr 1fr 1fr;
  gap:6px;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  align-items:center;
}
.gw-name{font-size:11.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gw .inp{padding:8px 9px;font-size:12px;min-height:36px}

/* ═══ MEMBER CARD ═══ */
.mcard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--rmd);
  padding:16px;
  cursor:pointer;
  margin-bottom:10px;
}
.avatar{
  width:42px;height:42px;
  border-radius:12px;
  background:var(--grad);
  display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:15px;
  font-family:var(--fd);
  flex-shrink:0;
}

/* ═══ HELPERS ═══ */
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.rowfw{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.fc{display:flex;align-items:center}
.fw{flex-wrap:wrap}
.g1{display:grid;grid-template-columns:1fr;gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.te{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w100{width:100%}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}
.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}
.f10{font-size:10px}.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}
.fd{font-family:var(--fd)}
.semi{font-weight:600}.bold{font-weight:700}.xb{font-weight:800}
.cm{color:var(--muted)}.ct2{color:var(--text-2)}
.cg{color:var(--green)}.cr{color:var(--red)}.cy{color:var(--yellow)}.cbl{color:var(--blue)}.cac{color:var(--accent)}
.grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
hr{border:none;border-top:1px solid var(--border);margin:14px 0}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:fadeUp .25s ease backwards}
.page>*:nth-child(1){animation-delay:.02s}
.page>*:nth-child(2){animation-delay:.06s}
.page>*:nth-child(3){animation-delay:.1s}
.page>*:nth-child(4){animation-delay:.14s}

/* ═══ TABLET (≥ 600px) ═══ */
@media(min-width:600px){
  .stats{grid-template-columns:repeat(4,1fr);gap:12px}
  .g2{gap:14px}
  .g3{grid-template-columns:repeat(3,1fr);gap:12px}
  .page{padding:20px 20px 90px}
  .top{padding:12px 20px}
  .gw{grid-template-columns:2fr 1fr 1fr;gap:10px}
  .modal-f .btn{flex:0 1 auto;min-width:120px}
  .modal-f{justify-content:flex-end}
}

/* ═══ DESKTOP (≥ 900px) ═══ */
@media(min-width:900px){
  .sb{
    transform:translateX(0);
    width:244px;
    box-shadow:none;
  }
  .main{margin-left:244px}
  .ham{display:none}
  .bn{display:none}
  .ov.show{display:none}
  .page{padding:24px 28px}
  .top{padding:12px 28px;height:62px}
  .top-title{font-size:17px}
  .top-date{font-size:11px}
  .g2{grid-template-columns:1fr 1fr;gap:16px}
  .g-teams{grid-template-columns:1fr 1fr 1fr;display:grid;gap:14px}
  .mcard{margin-bottom:0}
  .modal{align-items:center;padding:16px}
  .modal-body{border-radius:16px;max-width:520px}
  .card{padding:20px 22px}
  .stat-v{font-size:26px}
}

/* ═══ DESKTOP HOVER ═══ */
@media(hover:hover){
  .ni:hover{background:var(--surface-2);color:var(--text)}
  .btn-p:hover{transform:translateY(-1px)}
  .btn-g:hover{background:var(--surface-3);border-color:var(--border-hover)}
  .trow:hover{background:rgba(99,102,241,.03)}
  .mcard:hover{border-color:var(--accent)}
}
</style>
</head>
<body>
<div id="app">
  <div class="ov" id="ov" onclick="cSB()"></div>

  <aside class="sb" id="sb">
    <div class="sb-brand">
      <div class="logo">F</div>
      <div>
        <div class="sb-name">Founder's OS</div>
        <div class="sb-tag">Agency Command</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">Workspace</div>
      <button class="ni on" onclick="go('dash',this)"><span class="ni-ic">◆</span>Dashboard</button>
      <button class="ni" onclick="go('tasks',this)"><span class="ni-ic">✓</span>My Tasks<span class="ni-bd" id="tb">0</span></button>
      <button class="ni" onclick="go('routine',this)"><span class="ni-ic">◷</span>Daily Routine</button>
      <button class="ni" onclick="go('perf',this)"><span class="ni-ic">⏶</span>Performance</button>
      <div class="sb-sec">Business</div>
      <button class="ni" onclick="go('team',this)"><span class="ni-ic">◎</span>Team</button>
      <button class="ni" onclick="go('proj',this)"><span class="ni-ic">◫</span>Projects</button>
      <button class="ni" onclick="go('fin',this)"><span class="ni-ic">◈</span>Finance</button>
    </nav>
    <div class="sb-foot">
      <div class="pill"><span class="dot"></span><span id="pc">0</span> active</div>
    </div>
  </aside>

  <main class="main">
    <div class="top">
      <div class="top-left">
        <button class="ham" onclick="tSB()">☰</button>
        <div style="min-width:0;overflow:hidden">
          <div class="top-title" id="ptitle">Dashboard</div>
          <div class="top-date" id="pdate"></div>
        </div>
      </div>
      <button class="btn btn-p btn-sm" id="actbtn" onclick="doAction()" style="display:none">+ New</button>
    </div>
    <div class="page" id="pg"></div>
  </main>

  <nav class="bn">
    <button class="bn-b on" onclick="go('dash',this,1)"><span class="bn-ic">◆</span><span class="bn-l">Home</span></button>
    <button class="bn-b" onclick="go('tasks',this,1)"><span class="bn-ic">✓</span><span class="bn-l">Tasks</span></button>
    <button class="bn-b" onclick="go('routine',this,1)"><span class="bn-ic">◷</span><span class="bn-l">Routine</span></button>
    <button class="bn-b" onclick="go('team',this,1)"><span class="bn-ic">◎</span><span class="bn-l">Team</span></button>
    <button class="bn-b" onclick="go('fin',this,1)"><span class="bn-ic">◈</span><span class="bn-l">Finance</span></button>
  </nav>
</div>

<div class="modal" id="modal" style="display:none" onclick="if(event.target===this)cM()">
  <div class="modal-body">
    <div class="modal-h"><div class="modal-t" id="mtitle"></div><button class="modal-x" onclick="cM()">×</button></div>
    <div id="mbody"></div>
    <div class="modal-f" id="mfoot"></div>
  </div>
</div>

<script>
// ═══ STORAGE ═══
const ls={g:(k,d)=>{try{const v=localStorage.getItem('fos5_'+k);return v?JSON.parse(v):d}catch(e){return d}},s:(k,v)=>{try{localStorage.setItem('fos5_'+k,JSON.stringify(v))}catch(e){}}};

// ═══ HELPERS ═══
const uid=()=>Math.random().toString(36).slice(2,9);
const td=()=>new Date().toISOString().slice(0,10);
const dow=()=>new Date().getDay();
const fd=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'}):'—';
const pc=(a,b)=>b?Math.round(a/b*100):0;
const nf=(n,p='')=>`${p}${(+n||0).toLocaleString()}`;
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmtHour=h=>{if(h===0)return'12 AM';if(h===12)return'12 PM';return h<12?`${h} AM`:`${h-12} PM`};

// ═══ CONFIG ═══
const GWS=['Indian Pending','Binance 1','Binance 2','Binance 3','Redot Pay','bKash','Nagad','DBBL','Web Dev','BRAC Bank','Shefat Bank','Nabil Bank','Shaheed Bank','Sayem Bank','Cash','Marketplace','Payoneer','Stripe','Nsave','Payoneer Business','Wise','Zelle','CashApp'];
const HRS=Array.from({length:24},(_,i)=>i);
const BCS=['#6366f1','#8b5cf6','#ec4899','#06b6d4','#10d373','#ffb547','#ff7a3d','#ff3d5f'];
const BST=['Not Started','Pending','Working','Completed'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const BSM={
  'Not Started':{c:'var(--muted)',bg:'rgba(122,130,160,.12)',bd:'rgba(122,130,160,.22)',i:'○'},
  'Pending':{c:'var(--yellow)',bg:'rgba(255,181,71,.15)',bd:'rgba(255,181,71,.3)',i:'◔'},
  'Working':{c:'var(--blue)',bg:'rgba(59,157,255,.15)',bd:'rgba(59,157,255,.3)',i:'◑'},
  'Completed':{c:'var(--green)',bg:'rgba(16,211,115,.15)',bd:'rgba(16,211,115,.3)',i:'●'}
};
const PM={
  High:{c:'var(--red)',bg:'rgba(255,61,95,.15)',bd:'rgba(255,61,95,.3)'},
  Medium:{c:'var(--yellow)',bg:'rgba(255,181,71,.15)',bd:'rgba(255,181,71,.3)'},
  Low:{c:'var(--green)',bg:'rgba(16,211,115,.15)',bd:'rgba(16,211,115,.3)'}
};
const SM={
  Todo:{c:'var(--muted)',bg:'rgba(122,130,160,.12)',bd:'rgba(122,130,160,.22)'},
  'In Progress':{c:'var(--blue)',bg:'rgba(59,157,255,.15)',bd:'rgba(59,157,255,.3)'},
  Done:{c:'var(--green)',bg:'rgba(16,211,115,.15)',bd:'rgba(16,211,115,.3)'},
  Blocked:{c:'var(--red)',bg:'rgba(255,61,95,.15)',bd:'rgba(255,61,95,.3)'}
};

// ═══ SEED DATA ═══
const DT=[
  {id:uid(),title:'Client proposal – Zenith Co.',details:'Revised pricing + new scope',priority:'High',status:'In Progress',deadline:'2026-04-06',created:td(),recurring:'none'},
  {id:uid(),title:'Daily LinkedIn outreach',details:'Message 15 leads & follow up',priority:'Medium',status:'Todo',deadline:'',created:td(),recurring:'daily'},
  {id:uid(),title:'Weekly team sync',details:'Monday standup with leads',priority:'Medium',status:'Todo',deadline:'',created:td(),recurring:'weekly',recurDay:1},
  {id:uid(),title:'Send invoice – NovaBrand',details:'2nd reminder',priority:'High',status:'Todo',deadline:'2026-04-04',created:td(),recurring:'none'}
];
const DB=[
  {id:uid(),title:'Morning Standup',hour:9,dur:1,pri:'Medium',bs:'Not Started',color:'#6366f1',notes:''},
  {id:uid(),title:'Client Call – Zenith',hour:11,dur:1,pri:'High',bs:'Not Started',color:'#ec4899',notes:'Prepare deck'},
  {id:uid(),title:'Deep Work',hour:14,dur:2,pri:'High',bs:'Not Started',color:'#8b5cf6',notes:''},
  {id:uid(),title:'EOD Review',hour:17,dur:1,pri:'Low',bs:'Not Started',color:'#10d373',notes:''}
];
const DTEAM=[
  {id:uid(),name:'Riya Islam',dept:'Design',role:'Senior Designer',rating:4},
  {id:uid(),name:'Ahmed Hossain',dept:'Development',role:'Frontend Dev',rating:5},
  {id:uid(),name:'Priya Das',dept:'Content',role:'Copywriter',rating:3}
];
const DP=[
  {id:uid(),name:'Zenith Co. Rebrand',client:'Zenith Co.',status:'In Progress',deadline:'2026-05-01',budget:5000,spent:2200,desc:'Brand identity + website',progress:45},
  {id:uid(),name:'NovaBrand Campaign',client:'NovaBrand',status:'In Progress',deadline:'2026-04-20',budget:3000,spent:2800,desc:'Social media & ads',progress:80}
];
const DF={months:{'2026-04':{saleUSD:0,saleBDT:0,rate:115,expense:0,advance:0,salAdv:0,prevMonth:0,gws:Object.fromEntries(GWS.map(g=>[g,{usd:0,bdt:0}]))}}};

// ═══ STATE ═══
let CP='dash',TF='All',TQ='',RV='tl',FT='ov',FM='2026-04',TV='list',SMI=null;

// ═══ BADGE / PBAR ═══
function bdg(t,c,bg,bd){return `<span class="bdg" style="color:${c};background:${bg};border-color:${bd||'transparent'}">${t}</span>`}
function pb(p){const m=PM[p]||PM.Low;return bdg(p,m.c,m.bg,m.bd)}
function sb(s){const m=SM[s]||SM.Todo;return bdg(s,m.c,m.bg,m.bd)}
function bsb(s,id){const m=BSM[s]||BSM['Not Started'];return `<span class="bdg" style="color:${m.c};background:${m.bg};border-color:${m.bd};cursor:pointer" onclick="cBS('${id}')">${m.i} ${s}</span>`}
function pbar(v,c='var(--accent)',h=6){return `<div class="pb" style="height:${h}px"><div class="pf" style="width:${Math.min(v,100)}%;background:${c}"></div></div>`}

// ═══ NAVIGATION ═══
const TITLES={dash:'Dashboard',tasks:'My Tasks',routine:'Daily Routine',perf:'Performance',team:'Team',proj:'Projects',fin:'Finance'};
const ACTS={dash:'',tasks:'+ Task',routine:'+ Block',perf:'',team:'+ Member',proj:'+ Project',fin:''};

function go(p,el,mob=0){
  CP=p;
  $('ptitle').textContent=TITLES[p]||p;
  const a=ACTS[p];
  $('actbtn').textContent=a;
  $('actbtn').style.display=a?'inline-flex':'none';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll(`.ni[onclick*="go('${p}'"]`).forEach(n=>n.classList.add('on'));
  document.querySelectorAll('.bn-b').forEach(b=>b.classList.remove('on'));
  if(mob&&el)el.classList.add('on');
  if(mob)cSB();
  rp();
  window.scrollTo(0,0);
}
function doAction(){
  if(CP==='tasks')oTM();
  else if(CP==='routine')oBM();
  else if(CP==='team')oMM();
  else if(CP==='proj')oPM();
}
function tSB(){$('sb').classList.toggle('open');$('ov').classList.toggle('show')}
function cSB(){$('sb').classList.remove('open');$('ov').classList.remove('show')}

// ═══ MODAL ═══
function oModal(title,body,foot){$('mtitle').textContent=title;$('mbody').innerHTML=body;$('mfoot').innerHTML=foot;$('modal').style.display='flex'}
function cM(){$('modal').style.display='none'}
function ig(label,html){return `<div class="ig"><label class="il">${label}</label>${html}</div>`}
function ti(id,v='',ph='',t='text'){return `<input class="inp" id="${id}" type="${t}" value="${esc(v)}" placeholder="${esc(ph)}"/>`}
function si(id,opts,v){return `<select class="inp" id="${id}">${opts.map(o=>`<option${o===v?' selected':''}>${o}</option>`).join('')}</select>`}
function rg2(a,b){return `<div class="g2">${a}${b}</div>`}
function rg3(a,b,c){return `<div class="g3">${a}${b}${c}</div>`}

// ═══ TASKS ═══
function gTasks(){return ls.g('tasks',DT)}
function sTasks(t){ls.s('tasks',t);uBadges()}
function uBadges(){
  const tasks=gTasks().filter(t=>isActiveToday(t));
  const n=tasks.filter(t=>!isDone(t)).length;
  $('tb').textContent=n;$('tb').style.display=n?'':'none';$('pc').textContent=n;
}
function isDone(t){
  if(t.recurring==='none'||!t.recurring)return t.status==='Done';
  return (t.doneDates||[]).includes(td());
}
function isActiveToday(t){
  if(t.recurring==='none'||!t.recurring)return true;
  if(t.recurring==='daily')return true;
  if(t.recurring==='weekly')return t.recurDay===dow();
  return false;
}
function oTM(task=null){
  const e=!!task,x=task||{title:'',details:'',priority:'Medium',status:'Todo',deadline:'',recurring:'none',recurDay:1};
  const recurUI=`
    <div class="pills" style="margin-bottom:0">
      <button type="button" class="pil ${x.recurring==='none'?'on':''}" onclick="setRecur('none')">One-time</button>
      <button type="button" class="pil ${x.recurring==='daily'?'on':''}" onclick="setRecur('daily')">Daily</button>
      <button type="button" class="pil ${x.recurring==='weekly'?'on':''}" onclick="setRecur('weekly')">Weekly</button>
    </div>
    <input type="hidden" id="t_recur" value="${x.recurring||'none'}"/>
    <div id="t_recur_day_wrap" style="margin-top:10px;display:${x.recurring==='weekly'?'block':'none'}">
      <label class="il">Repeat on</label>
      <div class="pills" style="margin-bottom:0">
        ${DAYS.map((d,i)=>`<button type="button" class="pil ${x.recurDay===i?'on':''}" onclick="setRecurDay(${i})">${d}</button>`).join('')}
      </div>
      <input type="hidden" id="t_recur_day" value="${x.recurDay||1}"/>
    </div>`;
  oModal(e?'Edit Task':'New Task',
    ig('Task Title *',ti('t_t',x.title,'What needs to be done?'))+
    ig('Details',`<textarea class="inp" id="t_d" placeholder="Additional context…">${esc(x.details||'')}</textarea>`)+
    rg2(ig('Priority',si('t_p',['High','Medium','Low'],x.priority)),ig('Status',si('t_s',['Todo','In Progress','Done','Blocked'],x.status||'Todo')))+
    ig('Deadline',ti('t_dl',x.deadline||'','','date'))+
    ig('Repeat',recurUI),
    `<button class="btn btn-g" onclick="cM()">Cancel</button><button class="btn btn-p" onclick="svTask('${e?x.id:''}')">${e?'Save':'Add'}</button>`
  );
}
function setRecur(val){
  $('t_recur').value=val;
  const pills=$('mbody').querySelectorAll('.pills')[0].querySelectorAll('.pil');
  pills.forEach((p,i)=>p.classList.toggle('on',['none','daily','weekly'][i]===val));
  $('t_recur_day_wrap').style.display=val==='weekly'?'block':'none';
}
function setRecurDay(i){
  $('t_recur_day').value=i;
  $('t_recur_day_wrap').querySelectorAll('.pil').forEach((p,idx)=>p.classList.toggle('on',idx===i));
}
function svTask(id){
  const title=$('t_t').value.trim();if(!title){alert('Title required');return}
  const tasks=gTasks();
  const recurring=$('t_recur').value;
  const recurDay=recurring==='weekly'?+$('t_recur_day').value:null;
  const existing=id?tasks.find(x=>x.id===id):null;
  const t={
    id:id||uid(),title,details:$('t_d').value,
    priority:$('t_p').value,status:$('t_s').value,
    deadline:$('t_dl').value,
    created:existing?existing.created:td(),
    recurring,recurDay,
    doneDates:existing?existing.doneDates||[]:[]
  };
  sTasks(id?tasks.map(x=>x.id===id?t:x):[...tasks,t]);
  cM();rp();
}
function delTask(id){if(confirm('Delete this task?')){sTasks(gTasks().filter(t=>t.id!==id));rp()}}
function cTS(id){
  const tasks=gTasks();const t=tasks.find(x=>x.id===id);if(!t)return;
  if(t.recurring!=='none'&&t.recurring){
    const today=td();
    const dd=t.doneDates||[];
    const newDD=dd.includes(today)?dd.filter(d=>d!==today):[...dd,today];
    sTasks(tasks.map(x=>x.id===id?{...x,doneDates:newDD}:x));
  }else{
    const order=['Todo','In Progress','Done','Blocked'];
    sTasks(tasks.map(x=>x.id===id?{...x,status:order[(order.indexOf(x.status)+1)%order.length]}:x));
  }
  rp();
}

function rTasks(){
  const allTasks=gTasks();
  const tasks=allTasks.filter(t=>isActiveToday(t));
  const fl=tasks.filter(t=>{
    const matchSearch=t.title.toLowerCase().includes(TQ.toLowerCase());
    if(!matchSearch)return false;
    if(TF==='All')return true;
    if(TF==='Recurring')return t.recurring&&t.recurring!=='none';
    if(TF==='Done')return isDone(t);
    if(t.recurring!=='none'&&t.recurring)return TF==='Todo'&&!isDone(t);
    return t.status===TF;
  });
  const pending=tasks.filter(t=>!isDone(t)).length;
  const doneCount=tasks.filter(t=>isDone(t)).length;
  const recurCount=tasks.filter(t=>t.recurring&&t.recurring!=='none').length;
  return `
  <div class="mb14">
    <div class="fd f12 semi cm" style="text-transform:uppercase;letter-spacing:1px">Today's Tasks</div>
    <div class="f12 ct2 mt6">${pending} pending · ${doneCount} done${recurCount>0?` · ${recurCount} recurring`:''}</div>
  </div>
  <input class="inp mb12" placeholder="🔍 Search tasks…" value="${esc(TQ)}" oninput="TQ=this.value;rp()"/>
  <div class="pills">
    ${['All','Todo','In Progress','Done','Blocked','Recurring'].map(s=>`<button onclick="TF='${s}';rp()" class="pil ${TF===s?'on':''}">${s}</button>`).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    ${fl.length===0?'<div style="padding:28px 16px;color:var(--muted);font-size:13px;text-align:center">No tasks match your filter.</div>':''}
    ${fl.map(t=>{
      const done=isDone(t);
      const isRec=t.recurring&&t.recurring!=='none';
      return `<div class="trow">
        <button class="tck ${done?'on':''}" onclick="cTS('${t.id}')">${done?'✓':''}</button>
        <div class="tmain" onclick='oTM(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
          <div class="ttitle ${done?'done':''}">${esc(t.title)}</div>
          ${t.details?`<div class="tdetails">${esc(t.details)}</div>`:''}
          <div class="tmeta">
            ${pb(t.priority)}
            ${isRec?`<span class="rec">⟳ ${t.recurring==='daily'?'Daily':'Weekly · '+DAYS[t.recurDay]}</span>`:''}
            ${!isRec&&t.deadline?`<span class="f11 cm">${fd(t.deadline)}</span>`:''}
          </div>
        </div>
        <button class="tdel" onclick="delTask('${t.id}')">×</button>
      </div>`;
    }).join('')}
  </div>`;
}

// ═══ ROUTINE ═══
function gBlocks(){return ls.g('blocks',DB)}
function sBlocks(b){ls.s('blocks',b)}
function oBM(bl=null){
  const e=!!bl,b=bl||{title:'',hour:9,dur:1,pri:'Medium',bs:'Not Started',color:'#6366f1',notes:'',tid:null};
  const tasks=gTasks().filter(t=>!isDone(t)&&isActiveToday(t));
  oModal(e?'Edit Block':'Add Time Block',
    ig('Title *',ti('b_t',b.title,'e.g. Deep Work'))+
    rg2(ig('Start',`<select class="inp" id="b_h">${HRS.map(h=>`<option value="${h}"${h===b.hour?' selected':''}>${fmtHour(h)}</option>`).join('')}</select>`),ig('Duration',`<select class="inp" id="b_d">${[1,2,3,4].map(d=>`<option value="${d}"${d===b.dur?' selected':''}>${d}h</option>`).join('')}</select>`))+
    rg2(ig('Priority',si('b_p',['High','Medium','Low'],b.pri)),ig('Status',`<select class="inp" id="b_s">${BST.map(s=>`<option${s===b.bs?' selected':''}>${s}</option>`).join('')}</select>`))+
    ig('Link Task',`<select class="inp" id="b_tk"><option value="">— None —</option>${tasks.map(t=>`<option value="${t.id}"${t.id===b.tid?' selected':''}>${esc(t.title)}</option>`).join('')}</select>`)+
    ig('Color',`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">${BCS.map(c=>`<div onclick="document.getElementById('b_c').value='${c}'" style="width:32px;height:32px;border-radius:8px;background:${c};cursor:pointer;border:${c===b.color?'3px solid #fff':'3px solid transparent'};box-shadow:${c===b.color?'0 0 0 2px '+c:'none'}"></div>`).join('')}<input type="hidden" id="b_c" value="${b.color}"/></div>`)+
    ig('Notes',`<textarea class="inp" id="b_n" placeholder="Preparation notes…">${esc(b.notes||'')}</textarea>`),
    `<button class="btn btn-g" onclick="cM()">Cancel</button><button class="btn btn-p" onclick="svBlock('${e?b.id:''}')">${e?'Save':'Add'}</button>`
  );
}
function svBlock(id){
  const title=$('b_t').value.trim();if(!title){alert('Title required');return}
  const blocks=gBlocks();
  const b={id:id||uid(),title,hour:+$('b_h').value,dur:+$('b_d').value,pri:$('b_p').value,bs:$('b_s').value,tid:$('b_tk').value||null,color:$('b_c').value,notes:$('b_n').value};
  sBlocks(id?blocks.map(x=>x.id===id?b:x):[...blocks,b]);cM();rp();
}
function cBS(id){
  const blocks=gBlocks();
  sBlocks(blocks.map(b=>{if(b.id!==id)return b;const n=BST[(BST.indexOf(b.bs)+1)%BST.length];return{...b,bs:n}}));rp();
}
function delBlock(id){sBlocks(gBlocks().filter(b=>b.id!==id));rp()}

function rRoutine(){
  const blocks=gBlocks(),now=new Date().getHours();
  const tot=blocks.length,comp=blocks.filter(b=>b.bs==='Completed').length;
  const wrk=blocks.filter(b=>b.bs==='Working').length;
  const pend=blocks.filter(b=>b.bs==='Pending').length;
  const ns=blocks.filter(b=>b.bs==='Not Started').length;
  const score=tot?pc(comp,tot):0;
  const sc=score>=75?'var(--green)':score>=40?'var(--yellow)':'var(--red)';
  return `
  <div class="stats" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat"><div class="stat-l">Score</div><div class="stat-v" style="color:${sc}">${score}%</div></div>
    <div class="stat"><div class="stat-l">Done</div><div class="stat-v cg">${comp}/${tot}</div></div>
    <div class="stat"><div class="stat-l">Working</div><div class="stat-v cbl">${wrk}</div></div>
  </div>
  <div class="card">
    <div class="row mb14"><div class="fd semi f13 ct2">${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div><button class="btn btn-g btn-xs" onclick="RV='${RV==='tl'?'todo':'tl'}';rp()">${RV==='tl'?'📋 List':'◷ Timeline'}</button></div>
    ${pbar(score,sc,6)}
    <div class="row f11 mt8" style="gap:12px;flex-wrap:wrap;justify-content:flex-start">
      <span class="cg">● ${comp} done</span>
      <span class="cbl">● ${wrk} working</span>
      <span class="cy">● ${pend} pending</span>
      <span class="cm">● ${ns} not started</span>
    </div>
  </div>
  ${RV==='todo'?rRoutineTodo(blocks,now):rRoutineTimeline(blocks,now)}`;
}
function rRoutineTodo(blocks,now){
  const sorted=[...blocks].sort((a,b)=>a.hour-b.hour);
  return `<div class="card" style="padding:0">
    ${sorted.map(b=>{
      const lk=gTasks().find(t=>t.id===b.tid);
      return `<div class="trow">
        <button class="tck ${b.bs==='Completed'?'on':''}" onclick="cBS('${b.id}')">${b.bs==='Completed'?'✓':''}</button>
        <div class="tmain" onclick='oBM(${JSON.stringify(b).replace(/'/g,"&#39;")})' style="border-left:3px solid ${b.color};padding-left:10px">

function gFin(){return ls.g('fin',DF)}
function sFin(f){ls.s('fin',f)}
function calcFin(){
  const fin=gFin(),md=fin.months[FM]||{};
  const gwe=md.gws?Object.entries(md.gws):[];
  const gwU=gwe.reduce((s,[,v])=>s+(v.usd||0),0),gwB=gwe.reduce((s,[,v])=>s+(v.bdt||0),0);
  const rate=md.rate||115,calcBDT=(md.saleUSD||0)*rate;
  const saleBDT=md.saleBDT||calcBDT;
  const tExp=(md.expense||0)+(md.advance||0)+(md.salAdv||0);
  const net=saleBDT+(md.prevMonth||0)-tExp;
  const grandT=(gwU*rate)+gwB;
  return{md,gwU,gwB,rate,calcBDT,saleBDT,tExp,net,grandT};
}
function uFin(k,v){const fin=gFin();fin.months[FM]={...fin.months[FM]||{},[k]:+v||0};sFin(fin)}
function updateGateways(){
  const fin=gFin();const md=fin.months[FM]||{};const gws={...md.gws};
  GWS.forEach(gw=>{
    const id_=gw.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    const u=$('gw_u_'+id_),b=$('gw_b_'+id_);
    if(u||b)gws[gw]={usd:+(u?u.value:0)||0,bdt:+(b?b.value:0)||0};
  });
  fin.months[FM]={...md,gws};sFin(fin);rp();
}
function addMonth(){const m=prompt('Enter month (YYYY-MM):');if(!m)return;const fin=gFin();if(!fin.months[m]){fin.months[m]={saleUSD:0,saleBDT:0,rate:115,expense:0,advance:0,salAdv:0,prevMonth:0,gws:Object.fromEntries(GWS.map(g=>[g,{usd:0,bdt:0}]))};sFin(fin)}FM=m;rp()}
function recalc(){const fin=gFin();const md=fin.months[FM]||{};const calcBDT=(md.saleUSD||0)*(md.rate||115);fin.months[FM]={...md,saleBDT:calcBDT};sFin(fin);rp()}

function rFin(){
  const fin=gFin(),months=Object.keys(fin.months);
  const{md,gwU,gwB,rate,calcBDT,saleBDT,tExp,net,grandT}=calcFin();

  const hdr=`

  if(FT==='ov')return hdr+`
  <div class="stats">
    <div class="stat"><div class="stat-l">Sale USD</div><div class="stat-v cbl">${nf(md.saleUSD,'$')}</div></div>

    <div class="stat"><div class="stat-l">Net</div><div class="stat-v" style="color:${net>=0?'var(--green)':'var(--red)'}">${nf(net,'৳')}</div></div>
  </div>
  <div class="card">
    <div class="card-t">Monthly Inputs</div>
    <div class="g1">
      ${[{l:'Total Sale (USD)',k:'saleUSD',v:md.saleUSD||0},{l:'USD → BDT Rate',k:'rate',v:md.rate||115},{l:'Total Sale (BDT)',k:'saleBDT',v:md.saleBDT||0},{l:'Monthly Expenses (BDT)',k:'expense',v:md.expense||0},{l:'Advance Payment (BDT)',k:'advance',v:md.advance||0},{l:'Salary Advance (BDT)',k:'salAdv',v:md.salAdv||0},{l:'Previous Month (BDT)',k:'prevMonth',v:md.prevMonth||0}].map(f=>`<div><label class="il">${f.l}</label><input class="inp" type="number" value="${f.v}" onchange="uFin('${f.k}',this.value)"/></div>`).join('')}
    </div>
    <button class="btn btn-p w100 mt12" onclick="recalc()">🔄 Auto-Calculate BDT</button>
    <div style="padding:10px 14px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:var(--rsm);font-size:12px;color:var(--accent);font-weight:600;margin-top:10px;text-align:center">${nf(md.saleUSD||0,'$')} × ${md.rate||115} = ${nf(calcBDT,'৳')}</div>
  </div>`;

  if(FT==='gw')return hdr+`

  <div class="card" style="padding:12px 14px">
    <div class="gw" style="border-bottom:1.5px solid var(--border);padding-bottom:8px;margin-bottom:4px">
      <span class="stat-l" style="margin:0">Gateway</span>
      <span class="stat-l" style="margin:0">USD</span>
      <span class="stat-l" style="margin:0">BDT</span>
    </div>
    ${GWS.map(gw=>{
      const v=md.gws?.[gw]||{usd:0,bdt:0};
      const id_=gw.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
      return `<div class="gw">
        <span class="gw-name">${gw}</span>
        <input id="gw_u_${id_}" class="inp" type="number" value="${v.usd||''}" placeholder="0"/>
        <input id="gw_b_${id_}" class="inp" type="number" value="${v.bdt||''}" placeholder="0"/>
      </div>`;
    }).join('')}
    <div class="gw" style="padding:12px 0 4px;border-top:2px solid var(--border);margin-top:4px;border-bottom:none;font-weight:700;font-size:13px">
      <span class="ct2">Sub Total</span>
      <span class="cbl">$${gwU.toLocaleString()}</span>
      <span class="cg">৳${gwB.toLocaleString()}</span>
    </div>
  </div>
  <div style="background:var(--grad);border-radius:var(--rmd);padding:18px;margin-bottom:14px;position:relative;overflow:hidden">
    <div class="stat-l" style="color:rgba(255,255,255,.85);margin-bottom:6px">Grand Total (BDT)</div>
    <div class="fd xb" style="font-size:26px;color:#fff;letter-spacing:-0.8px;line-height:1;margin-bottom:6px">৳${grandT.toLocaleString()}</div>
    <div class="f11" style="color:rgba(255,255,255,.75)">($${gwU.toLocaleString()} × ${rate}) + ৳${gwB.toLocaleString()}</div>
  </div>`;

  return hdr+`
  <div class="card">
    <div class="card-t">Summary — ${FM}</div>
    ${[{l:'Sale (USD)',v:nf(md.saleUSD,'$'),c:'var(--blue)'},{l:'Sale (BDT)',v:nf(saleBDT,'৳'),c:'var(--green)'},{l:'Rate',v:`${rate} BDT/$1`,c:'var(--text-2)'},{l:'Gateway USD',v:nf(gwU,'$'),c:'var(--blue)'},{l:'Gateway BDT',v:nf(gwB,'৳'),c:'var(--green)'},{l:'Grand Total (BDT)',v:nf(grandT,'৳'),c:'var(--accent)'},{l:'Expenses',v:nf(md.expense,'৳'),c:'var(--red)'},{l:'Advance',v:nf(md.advance,'৳'),c:'var(--red)'},{l:'Salary Advance',v:nf(md.salAdv,'৳'),c:'var(--red)'},{l:'Previous Month',v:nf(md.prevMonth,'৳'),c:'var(--text-2)'}].map(r=>`
    <div class="row" style="padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px"><span class="ct2 semi">${r.l}</span><span class="bold" style="color:${r.c}">${r.v}</span></div>`).join('')}
    <div class="row" style="padding:14px 0 0;font-size:15px;font-weight:800">
      <span class="fd">Net Balance</span><span class="fd" style="color:${net>=0?'var(--green)':'var(--red)'}">৳${net.toLocaleString()}</span>
    </div>
  </div>`;
}

// ═══ DASHBOARD ═══
function rDash(){
  const tasks=gTasks().filter(t=>isActiveToday(t));
  const done=tasks.filter(t=>isDone(t)).length,tot=tasks.length;
  const high=tasks.filter(t=>t.priority==='High'&&!isDone(t)).length;
  const ov=tasks.filter(t=>t.deadline&&t.deadline<td()&&!isDone(t)).length;
  const blocks=gBlocks(),bDone=blocks.filter(b=>b.bs==='Completed').length;
  const ds=blocks.length?pc(bDone,blocks.length):0,dsc=ds>=75?'var(--green)':ds>=40?'var(--yellow)':'var(--red)';
  const hr=new Date().getHours(),gr=hr<12?'morning':hr<17?'afternoon':'evening';
  return `
  <div class="mb16">
    <div class="fd xb" style="font-size:24px;letter-spacing:-0.8px">Good ${gr}<span class="grad-txt">.</span></div>
    <div class="f11 cm mt6">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
  </div>
  <div class="stats">
    <div class="stat hero"><div class="stat-l"><span class="stat-ic">⚡</span>Complete</div><div class="stat-v">${pc(done,tot)}%</div><div class="stat-s">${done}/${tot} tasks</div></div>
    <div class="stat"><div class="stat-l"><span class="stat-ic">⏱</span>Day Score</div><div class="stat-v" style="color:${dsc}">${ds}%</div><div class="stat-s">${bDone}/${blocks.length} blocks</div></div>
    <div class="stat"><div class="stat-l"><span class="stat-ic">🔥</span>High Prio</div><div class="stat-v cr">${high}</div><div class="stat-s">need focus</div></div>
    <div class="stat"><div class="stat-l"><span class="stat-ic">⚠</span>Overdue</div><div class="stat-v" style="color:${ov>0?'var(--red)':'var(--green)'}">${ov}</div><div class="stat-s">past due</div></div>
  </div>
  <div class="card">
    <div class="card-t">Task Progress</div>
    ${pbar(pc(done,tot),'var(--grad)',10)}
    <div class="row f11 cm mt8"><span>${done} done</span><span>${tot-done} remaining</span></div>
  </div>
  <div class="card">
    <div class="card-t">Today's Blocks</div>
    ${blocks.slice(0,5).map(b=>`<div class="fc gap10" style="padding:8px 0;border-bottom:1px solid var(--border)"><div style="width:4px;height:32px;border-radius:99px;background:${b.color};flex-shrink:0"></div><div style="flex:1;min-width:0"><div class="f12 semi te">${esc(b.title)}</div><div class="f10 cm">${fmtHour(b.hour)} · ${b.dur}h</div></div>${bsb(b.bs,b.id)}</div>`).join('')}
    ${blocks.length===0?'<div class="f12 cm">No blocks yet. Tap + Block to add.</div>':''}
  </div>
  ${high>0?`<div class="card">
    <div class="card-t">High Priority</div>
    ${tasks.filter(t=>t.priority==='High'&&!isDone(t)).slice(0,4).map(t=>`<div class="rowfw gap10" style="padding:10px 0;border-bottom:1px solid var(--border)"><span class="f13 semi te" style="flex:1;min-width:0">${esc(t.title)}</span><div class="fc gap6">${sb(t.status)}${t.deadline?`<span class="f11 cm">${fd(t.deadline)}</span>`:''}</div></div>`).join('')}
  </div>`:''}`;
}

// ═══ RENDER ═══
function rp(){
  const el=$('pg');if(!el)return;
  switch(CP){
    case'dash':el.innerHTML=rDash();break;
    case'tasks':el.innerHTML=rTasks();break;
    case'routine':el.innerHTML=rRoutine();break;
    case'perf':el.innerHTML=rPerf();break;
    case'team':el.innerHTML=rTeam();break;
    case'proj':el.innerHTML=rProj();break;
    case'fin':el.innerHTML=rFin();break;
  }
  uBadges();
}

// ═══ INIT ═══
window.addEventListener('DOMContentLoaded',()=>{
  $('pdate').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  rp();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
});

Object.assign(window,{go,tSB,cSB,doAction,cM,oTM,svTask,delTask,cTS,setRecur,setRecurDay,oBM,svBlock,cBS,delBlock,oMM,svMember,oAT,svAT,cTTS,setRat,oPM,svProj,uFin,updateGateways,addMonth,recalc,svSnap,rp,gTasks,sTasks,gTeam,sTeam,gTT,sTT,gProj,sProj,gFin,sFin,gBlocks,sBlocks,$,TF,TQ,RV,FT,FM,TV,SMI,isDone,isActiveToday});
</script>
</body>
</html>
