<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>The Founder's OS</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#f8f9fc"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Founder's OS"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f4f6fb;--surface:#fff;--s2:#eef1f8;--border:#e2e7f0;--b2:#cdd4e8;
--text:#0c0e1a;--t2:#4a5270;--muted:#8b93b0;
--accent:#4361ee;--a2:#3a0ca3;--aBg:#eef1fd;
--green:#0ab87a;--gBg:#e5f8f1;
--red:#e63946;--rBg:#fdeef0;
--yellow:#f4a21a;--yBg:#fef8e7;
--purple:#7b2d8b;--pBg:#f4eafd;
--r:12px;--rs:8px;
--shadow:0 1px 8px rgba(67,97,238,.07);
--shadow2:0 4px 20px rgba(67,97,238,.13);
--f:'Poppins',sans-serif;
}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button,input,select,textarea{font-family:var(--f)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* Layout */
#app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden}
.s-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-icon{width:38px;height:38px;background:linear-gradient(135deg,#4361ee,#7209b7);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0}
.s-name{font-size:13px;font-weight:700;line-height:1.2;color:var(--text)}
.s-sub{font-size:9px;font-weight:400;color:var(--muted);margin-top:1px}
.s-nav{flex:1;padding:10px 8px;overflow-y:auto}
.s-sec{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;padding:12px 8px 5px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rs);cursor:pointer;color:var(--t2);font-size:12.5px;font-weight:500;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;transition:all .12s}
.ni:hover{background:var(--s2);color:var(--text)}
.ni.on{background:var(--aBg);color:var(--accent);font-weight:600}
.ni-ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;padding:1px 6px;font-size:10px;font-weight:700}
.s-foot{padding:12px 14px;border-top:1px solid var(--border)}
.pend-pill{display:inline-flex;align-items:center;gap:5px;background:var(--aBg);color:var(--accent);border-radius:99px;padding:4px 10px;font-size:11px;font-weight:600}

/* Main */
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-title{font-size:15px;font-weight:700;color:var(--text)}
.tb-date{font-size:11px;color:var(--muted)}
.page{padding:22px 24px;flex:1}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.cs{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.ct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* Stats */
.sg{display:grid;gap:12px;margin-bottom:18px}
.s4{grid-template-columns:repeat(4,1fr)}
.s3{grid-template-columns:repeat(3,1fr)}
.s2{grid-template-columns:1fr 1fr}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.sl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.sv{font-size:26px;font-weight:800;letter-spacing:-0.8px;line-height:1}
.ss{font-size:11px;color:var(--muted);margin-top:4px}

/* Progress */
.pb{background:var(--border);border-radius:99px;overflow:hidden}
.pf{border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;white-space:nowrap;font-family:var(--f)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:var(--rs);padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .13s;font-family:var(--f)}
.bp{background:var(--accent);color:#fff}
.bp:hover{background:var(--a2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(67,97,238,.3)}
.bg{background:transparent;color:var(--t2);border:1px solid var(--b2)}
.bg:hover{background:var(--s2)}
.bsm{padding:5px 10px;font-size:11px}
.bic{width:32px;height:32px;padding:0;justify-content:center}

/* Inputs */
.inp{border:1.5px solid var(--border);border-radius:var(--rs);padding:9px 11px;font-size:12.5px;color:var(--text);background:var(--surface);width:100%;outline:none;transition:border .13s;font-family:var(--f);font-weight:400}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(67,97,238,.09)}
.ig{margin-bottom:12px}
.il{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
textarea.inp{resize:vertical;min-height:70px;line-height:1.6}
select.inp{cursor:pointer}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(10,12,26,.4);z-index:400;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(5px)}
.mb{background:var(--surface);border-radius:16px;padding:24px;width:100%;max-width:490px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mt{font-size:15px;font-weight:700}
.mc{background:var(--s2);border:none;border-radius:var(--rs);width:28px;height:28px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

/* Table */
.th{display:grid;gap:8px;padding:0 0 8px;border-bottom:1.5px solid var(--b2);font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.tr{display:grid;gap:8px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.tr:hover{background:var(--s2);margin:0 -4px;padding-left:4px;padding-right:4px;border-radius:var(--rs)}

/* Timeline */
.trow{display:flex;min-height:50px;border-bottom:1px solid var(--border)}
.thour{min-width:50px;padding:9px 8px 0 0;text-align:right;font-size:10px;font-weight:600;flex-shrink:0}
.tcontent{flex:1;padding:5px 0 5px 12px;border-left:2px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}
.bcard{border-radius:var(--rs);padding:7px 10px;cursor:pointer;min-width:140px;transition:transform .1s,box-shadow .1s}
.bcard:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
.bt{font-size:11px;font-weight:700;margin-bottom:4px}
.bm{display:flex;gap:5px;align-items:center;flex-wrap:wrap}

/* Finance */
.gwr{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);align-items:center}
.gwtot{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;padding:10px 0 0;font-weight:700;font-size:13px;border-top:2px solid var(--b2);margin-top:4px}

/* Mobile nav */
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 16px rgba(0,0,0,.07)}
.mni{display:flex;justify-content:space-around;padding:5px 0}
.mnb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;min-width:44px}
.mnb span:first-child{font-size:19px;line-height:1}
.mnl{font-size:9px;font-weight:600;font-family:var(--f)}

/* Overlay */
.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99}
.ham{display:none;background:none;border:none;cursor:pointer;padding:5px;font-size:20px;color:var(--text)}

/* Divider */
hr.dv{border:none;border-top:1px solid var(--border);margin:14px 0}

/* Helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fb{display:flex;justify-content:space-between;align-items:center}
.fc{display:flex;align-items:center}
.fw{flex-wrap:wrap}
.te{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w100{width:100%}
.bold{font-weight:700}
.semi{font-weight:600}
.f11{font-size:11px}
.f12{font-size:12px}
.f13{font-size:13px}
.cm{color:var(--muted)}
.ca{color:var(--accent)}
.cg{color:var(--green)}
.cr{color:var(--red)}
.mb4{margin-bottom:4px}
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.gap4{gap:4px}
.gap6{gap:6px}
.gap8{gap:8px}
.gap10{gap:10px}
.gap12{gap:12px}
.gap16{gap:16px}

@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:fi .18s ease}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);width:260px;box-shadow:none}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow2)}
  .so.show{display:block}
  .main{margin-left:0}
  .ham{display:flex}
  .mnav{display:block}
  .page{padding:14px 14px 76px}
  .topbar{padding:0 14px}
  .s4{grid-template-columns:1fr 1fr}
  .s3{grid-template-columns:1fr 1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .th{display:none}
  .gwr{grid-template-columns:1.4fr 1fr 1fr}
  .gwtot{grid-template-columns:1.4fr 1fr 1fr}
}
@media(min-width:769px){.mnav{display:none!important}}
@media(max-width:480px){
  .s4{grid-template-columns:1fr 1fr}
  .sv{font-size:22px}
  .page{padding:12px 12px 76px}
}
</style>
</head>
<body>
<div id="app">
  <div class="so" id="so" onclick="cSB()"></div>
  <div class="sidebar" id="sb">
    <div class="s-logo">
      <div class="s-icon">F</div>
      <div><div class="s-name">The Founder's OS</div><div class="s-sub">Agency Command Center</div></div>
    </div>
    <div class="s-nav">
      <div class="s-sec">Workspace</div>
      <button class="ni on" onclick="go('dash',this)"><span class="ni-ic">⚡</span>Dashboard</button>
      <button class="ni" onclick="go('tasks',this)"><span class="ni-ic">✅</span>My Tasks<span class="ni-badge" id="tb">0</span></button>
      <button class="ni" onclick="go('routine',this)"><span class="ni-ic">🗓</span>Daily Routine</button>
      <button class="ni" onclick="go('perf',this)"><span class="ni-ic">📈</span>Performance</button>
      <button class="ni" onclick="go('team',this)"><span class="ni-ic">👥</span>Team</button>
      <button class="ni" onclick="go('proj',this)"><span class="ni-ic">📁</span>Projects</button>
      <button class="ni" onclick="go('fin',this)"><span class="ni-ic">💰</span>Finance</button>
    </div>
    <div class="s-foot"><div class="pend-pill">⏳ <span id="pc">0</span> pending</div></div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="fc gap10">
        <button class="ham" onclick="tSB()">☰</button>
        <div><div class="tb-title" id="ptitle">Dashboard</div><div class="tb-date" id="pdate"></div></div>
      </div>
      <button class="btn bp bsm" id="tactn" onclick="doAction()">+ New</button>
    </div>
    <div class="page" id="pg"></div>
  </div>

  <div class="mnav">
    <div class="mni">
      <button class="mnb" onclick="go('dash',this,1)"><span>⚡</span><span class="mnl" style="color:var(--accent)">Home</span></button>
      <button class="mnb" onclick="go('tasks',this,1)"><span>✅</span><span class="mnl cm">Tasks</span></button>
      <button class="mnb" onclick="go('routine',this,1)"><span>🗓</span><span class="mnl cm">Routine</span></button>
      <button class="mnb" onclick="go('team',this,1)"><span>👥</span><span class="mnl cm">Team</span></button>
      <button class="mnb" onclick="go('fin',this,1)"><span>💰</span><span class="mnl cm">Finance</span></button>
    </div>
  </div>
</div>

<div class="mo" id="modal" style="display:none" onclick="if(e.target===this)cM()">
  <div class="mb">
    <div class="mh"><div class="mt" id="mtitle"></div><button class="mc" onclick="cM()">×</button></div>
    <div id="mbody"></div>
    <div class="mf" id="mfoot"></div>
  </div>
</div>

<script>
// ── Storage
const ls={g:(k,d)=>{try{const v=localStorage.getItem('fos2_'+k);return v?JSON.parse(v):d}catch(e){return d}},s:(k,v)=>{try{localStorage.setItem('fos2_'+k,JSON.stringify(v))}catch(e){}}};

// ── Helpers
const uid=()=>Math.random().toString(36).slice(2,9);
const td=()=>new Date().toISOString().slice(0,10);
const fd=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
const pc=(a,b)=>b?Math.round(a/b*100):0;
const nf=(n,p='')=>`${p}${(+n||0).toLocaleString()}`;
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Config
const GWS=['Indian Rest','Binance Nabil','Binance Nabil 2','Binance Shefat','Redot Pay','bKash','Nagad','DBBL','Web Dev','BRAC Bank','Shefat DBBL','Nabil DBBL','Sayem DBBL','Shaheed DBBL','Cash','Marketplace','Payoneer','Stripe','Nsave','Payoneer Business','Wise','Zelle','CashApp'];
const HRS=Array.from({length:24},(_,i)=>i);
const BCS=['#4361ee','#0ab87a','#7b2d8b','#f4a21a','#e63946','#fb5607','#4cc9f0'];
const BST=['Not Started','Pending','Working','Completed'];
const BSM={'Not Started':{c:'var(--muted)',bg:'var(--s2)',i:'○'},'Pending':{c:'var(--yellow)',bg:'var(--yBg)',i:'◔'},'Working':{c:'var(--accent)',bg:'var(--aBg)',i:'◑'},'Completed':{c:'var(--green)',bg:'var(--gBg)',i:'●'}};
const PM={High:['var(--red)','var(--rBg)'],Medium:['var(--yellow)','var(--yBg)'],Low:['var(--green)','var(--gBg)']};
const SM={Todo:['var(--muted)','var(--s2)'],'In Progress':['var(--accent)','var(--aBg)'],Done:['var(--green)','var(--gBg)'],Blocked:['var(--red)','var(--rBg)']};

// ── Seed
const DT=[{id:uid(),title:'Client proposal – Zenith Co.',details:'Revised pricing + new scope',priority:'High',status:'In Progress',deadline:'2026-04-06',created:td()},{id:uid(),title:'Review social media calendar',details:'April content plan',priority:'Medium',status:'Todo',deadline:'2026-04-08',created:td()},{id:uid(),title:'Send invoice – NovaBrand',details:'2nd reminder',priority:'High',status:'Todo',deadline:'2026-04-04',created:td()},{id:uid(),title:'Website copy review',details:'',priority:'Low',status:'Done',deadline:'2026-04-02',created:'2026-04-01'}];
const DB=[{id:uid(),title:'Morning Standup',hour:9,dur:1,pri:'Medium',bs:'Not Started',color:'#4361ee',notes:''},{id:uid(),title:'Client Call – Zenith',hour:11,dur:1,pri:'High',bs:'Not Started',color:'#e63946',notes:'Prepare deck'},{id:uid(),title:'Deep Work',hour:14,dur:2,pri:'High',bs:'Not Started',color:'#7b2d8b',notes:''},{id:uid(),title:'EOD Review',hour:17,dur:1,pri:'Low',bs:'Not Started',color:'#0ab87a',notes:''}];
const DTEAM=[{id:uid(),name:'Riya Islam',dept:'Design',role:'Senior Designer',rating:4},{id:uid(),name:'Ahmed Hossain',dept:'Development',role:'Frontend Dev',rating:5},{id:uid(),name:'Priya Das',dept:'Content',role:'Copywriter',rating:3}];
const DP=[{id:uid(),name:'Zenith Co. Rebrand',client:'Zenith Co.',status:'In Progress',deadline:'2026-05-01',budget:5000,spent:2200,desc:'Brand identity + website',progress:45},{id:uid(),name:'NovaBrand Campaign',client:'NovaBrand',status:'In Progress',deadline:'2026-04-20',budget:3000,spent:2800,desc:'Social media & ads',progress:80},{id:uid(),name:'Internal Website',client:'Internal',status:'Todo',deadline:'2026-06-01',budget:1500,spent:0,desc:'Agency portfolio',progress:0}];
const DF={months:{'2026-04':{saleUSD:12500,saleBDT:0,rate:115,expense:253000,advance:20000,salAdv:15000,prevMonth:80000,gws:Object.fromEntries(GWS.map(g=>[g,{usd:0,bdt:0}]))}}};

// ── State
let CP='dash', TF='All', TQ='', RV='tl', FT='ov', FM='2026-04', TV='list', SMI=null;

// ── Badge/PBar helpers
function bdg(t,c,bg){return `<span class="badge" style="color:${c};background:${bg}">${t}</span>`}
function pb(p){const[c,b]=PM[p]||['var(--muted)','var(--s2)'];return bdg(p,c,b)}
function sb(s){const[c,b]=SM[s]||['var(--muted)','var(--s2)'];return bdg(s,c,b)}
function bsb(s,id){const m=BSM[s]||BSM['Not Started'];return `<span class="badge" style="color:${m.c};background:${m.bg};cursor:pointer" onclick="cBS('${id}')">${m.i} ${s}</span>`}
function pbar(v,c='var(--accent)',h=6){return `<div class="pb" style="height:${h}px"><div class="pf" style="width:${Math.min(v,100)}%;height:100%;background:${c}"></div></div>`}

// ── Navigation
const TITLES={dash:'Dashboard',tasks:'My Tasks',routine:'Daily Routine',perf:'Performance',team:'Team',proj:'Projects',fin:'Finance'};
const ACTS={dash:'',tasks:'+ New Task',routine:'+ Add Block',perf:'',team:'+ Add Member',proj:'+ New Project',fin:''};

function go(p,el,mob=0){
  CP=p;
  $('ptitle').textContent=TITLES[p]||p;
  const a=ACTS[p];
  $('tactn').textContent=a;
  $('tactn').style.display=a?'':'none';
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.querySelectorAll(`[onclick*="go('${p}'"]`).forEach(n=>n.classList.add('on'));
  document.querySelectorAll('.mnb').forEach(b=>{b.querySelector('.mnl').style.color='var(--muted)'});
  if(mob&&el){el.querySelector('.mnl').style.color='var(--accent)'}
  if(mob)cSB();
  rp();
}
function doAction(){
  if(CP==='tasks')oTM();
  else if(CP==='routine')oBM();
  else if(CP==='team')oMM();
  else if(CP==='proj')oPM();
}
function tSB(){$('sb').classList.toggle('open');$('so').classList.toggle('show')}
function cSB(){$('sb').classList.remove('open');$('so').classList.remove('show')}

// ── Modal
function oModal(title,body,foot){$('mtitle').textContent=title;$('mbody').innerHTML=body;$('mfoot').innerHTML=foot;$('modal').style.display='flex'}
function cM(){$('modal').style.display='none'}
function ig(label,html){return `<div class="ig"><label class="il">${label}</label>${html}</div>`}
function ti(id,v='',ph='',t='text'){return `<input class="inp" id="${id}" type="${t}" value="${esc(v)}" placeholder="${ph}"/>`}
function si(id,opts,v){return `<select class="inp" id="${id}">${opts.map(o=>`<option${o===v?' selected':''}>${o}</option>`).join('')}</select>`}
function rg(...items){return `<div style="display:grid;grid-template-columns:${items.map(()=>'1fr').join(' ')};gap:10px">${items.join('')}</div>`}

// ── Tasks
function gTasks(){return ls.g('tasks',DT)}
function sTasks(t){ls.s('tasks',t);uBadges()}
function uBadges(){
  const tasks=gTasks(),n=tasks.filter(t=>t.status!=='Done').length;
  $('tb').textContent=n;$('tb').style.display=n?'':'none';$('pc').textContent=n;
}
function oTM(t=null){

function svSnap(){

  const acc=done?pc(ot,done):0;

      <div class="fc gap4">${[1,2,3,4,5].map(r=>`<button onclick="setRat('${m.id}',${r})" style="font-size:24px;background:none;border:none;cursor:pointer;color:${r<=m.rating?'var(--yellow)':'var(--b2)'}">★</button>`).join('')}<span class="f13 cm" style="margin-left:5px">${m.rating}/5</span></div>
    </div>`;
  }
  return `
  <div class="fb mb16 fw gap8"><div class="f12 cm">${team.length} members</div><div class="fc gap6"><button class="btn bg bsm" onclick="oAT()">+ Assign Task</button></div></div>
  <div class="g3">
    ${team.map(m=>{const mts=mt(m.id),done=mts.filter(t=>t.status==='Done').length;return `
    <div class="card" style="cursor:pointer" onclick="SMI='${m.id}';TV='member';rp()">
      <div class="fb mb10">
        <div style="width:38px;height:38px;border-radius:10px;background:var(--aBg);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);font-size:15px">${m.name[0]}</div>
        <button onclick="event.stopPropagation();if(confirm('Remove?')){sTeam(gTeam().filter(x=>x.id!=='${m.id}'));rp()}" style="background:var(--s2);border:none;cursor:pointer;color:var(--muted);border-radius:5px;width:24px;height:24px;font-size:13px">×</button>
      </div>
      <div class="f13 bold mb4">${esc(m.name)}</div><div class="f11 cm mb8">${esc(m.role)}</div>
      <span class="badge mb10" style="color:var(--purple);background:var(--pBg);display:inline-block">${esc(m.dept)}</span>
      <div class="fb f11 cm mb6"><span>${done}/${mts.length} done</span><span>${pc(done,mts.length)}%</span></div>
      ${pbar(pc(done,mts.length),'var(--accent)',5)}
      <div class="fc gap2 mt10">${[1,2,3,4,5].map(r=>`<span style="color:${r<=m.rating?'var(--yellow)':'var(--b2)'};font-size:13px">★</span>`).join('')}</div>
    </div>`}).join('')}
  </div>`;
}

// ── Projects
function gProj(){return ls.g('proj',DP)}
function sProj(p){ls.s('proj',p)}
function oPM(p=null){
  const e=!!p,x=p||{name:'',client:'',status:'Todo',deadline:'',budget:0,spent:0,desc:'',progress:0};
  oModal(e?'Edit Project':'New Project',
    ig('Project Name *',ti('p_n',x.name,'Project name'))+
    rg(ig('Client',ti('p_c',x.client,'Client')),ig('Status',si('p_s',['Todo','In Progress','On Hold','Done','Cancelled'],x.status)),ig('Deadline',ti('p_dl',x.deadline||'','','date')))+
    rg(ig('Budget ($)',ti('p_b',x.budget,'0','number')),ig('Spent ($)',ti('p_sp',x.spent,'0','number')),ig('Progress %',ti('p_pr',x.progress,'0','number')))+
    ig('Description',`<textarea class="inp" id="p_d" placeholder="Description…">${x.desc||''}</textarea>`),
    `<button class="btn bg" onclick="cM()">Cancel</button><button class="btn bp" onclick="svProj('${e?x.id:''}')">${e?'Save':'Create'}</button>`
  );
}
function svProj(id){
  const name=$('p_n').value.trim();if(!name)return alert('Name required');
  const projects=gProj();
  const p={id:id||uid(),name,client:$('p_c').value,status:$('p_s').value,deadline:$('p_dl').value,budget:+$('p_b').value,spent:+$('p_sp').value,progress:+$('p_pr').value,desc:$('p_d').value};
  sProj(id?projects.map(x=>x.id===id?p:x):[...projects,p]);cM();rp();
}
function rProj(){
  const proj=gProj();
  return `
  <div class="fb mb16"><div class="f12 cm">${proj.filter(p=>p.status==='In Progress').length} active · ${proj.length} total</div></div>
  <div class="g2">
    ${proj.map(p=>{const ov=p.spent>p.budget;return `
    <div class="card" style="cursor:pointer" onclick='oPM(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      <div class="fb mb10">
        <div style="overflow:hidden"><div class="f13 bold te">${esc(p.name)}</div><div class="f11 cm">${esc(p.client)}</div></div>
        <div class="fc gap6">${sb(p.status)}<button onclick="event.stopPropagation();if(confirm('Delete?')){sProj(gProj().filter(x=>x.id!=='${p.id}'));rp()}" style="background:var(--s2);border:none;cursor:pointer;color:var(--muted);border-radius:5px;width:24px;height:24px;font-size:13px">×</button></div>
      </div>
      ${p.desc?`<div class="f11 cm mb10">${esc(p.desc)}</div>`:''}
      <div class="mb10"><div class="fb f11 cm mb5"><span>Progress</span><span style="font-weight:700;color:var(--text)">${p.progress}%</span></div>${pbar(p.progress,p.status==='Done'?'var(--green)':'var(--accent)',7)}</div>
      <div class="fb f11 fw gap4"><span><span class="cm">Budget: </span><strong>$${(p.budget||0).toLocaleString()}</strong><span style="color:${ov?'var(--red)':'var(--muted)'};margin-left:4px">Spent: $${(p.spent||0).toLocaleString()}</span>${ov?`<span class="badge" style="color:var(--red);background:var(--rBg);margin-left:4px">Over!</span>`:''}</span><span class="cm">${fd(p.deadline)}</span></div>
    </div>`}).join('')}
  </div>`;
}

// ── Finance
function gFin(){return ls.g('fin',DF)}
function sFin(f){ls.s('fin',f)}
function calcFin(){
  const fin=gFin(),md=fin.months[FM]||{};
  const gwe=md.gws?Object.entries(md.gws):[];
  const gwU=gwe.reduce((s,[,v])=>s+(v.usd||0),0),gwB=gwe.reduce((s,[,v])=>s+(v.bdt||0),0);
  const rate=md.rate||115,calcBDT=(md.saleUSD||0)*rate;
  const saleBDT=md.saleBDT||calcBDT;
  const tExp=(md.expense||0)+(md.advance||0)+(md.salAdv||0);
  const net=saleBDT+(md.prevMonth||0)-tExp;
  return{md,gwU,gwB,rate,calcBDT,saleBDT,tExp,net};
}
function uFin(k,v){const fin=gFin();fin.months[FM]={...fin.months[FM]||{},[k]:+v||0};sFin(fin)}
function uGW(gw,cur,v){const fin=gFin();const md=fin.months[FM]||{};const gws={...md.gws,[gw]:{...md.gws?.[gw],[cur]:+v||0}};fin.months[FM]={...md,gws};sFin(fin)}
function addMonth(){const m=prompt('Enter month (YYYY-MM):');if(!m)return;const fin=gFin();if(!fin.months[m]){fin.months[m]={saleUSD:0,saleBDT:0,rate:115,expense:0,advance:0,salAdv:0,prevMonth:0,gws:Object.fromEntries(GWS.map(g=>[g,{usd:0,bdt:0}]))};sFin(fin)}FM=m;rp()}
function recalc(){const fin=gFin();const md=fin.months[FM]||{};const calcBDT=(md.saleUSD||0)*(md.rate||115);fin.months[FM]={...md,saleBDT:calcBDT};sFin(fin);rp()}
function rFin(){
  const fin=gFin(),months=Object.keys(fin.months);
  const{md,gwU,gwB,rate,calcBDT,saleBDT,tExp,net}=calcFin();
  const tabBtns=['ov','gw','sum'].map((t,i)=>{const lbl=['Overview','Gateways','Summary'][i];return `<button onclick="FT='${t}';rp()" style="height:34px;padding:0 16px;font-size:12px;font-weight:600;border-radius:var(--rs);border:1.5px solid ${FT===t?'var(--accent)':'var(--b2)'};background:${FT===t?'var(--accent)':'var(--surface)'};color:${FT===t?'#fff':'var(--t2)'};cursor:pointer;font-family:var(--f);display:inline-flex;align-items:center;white-space:nowrap">${lbl}</button>`}).join('');
  const hdr=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap"><div style="display:flex;gap:6px;align-items:center">${tabBtns}</div><div style="display:flex;gap:8px;align-items:center"><select class="inp" style="width:120px;padding:0 10px;height:34px;font-size:12px" onchange="FM=this.value;rp()">${months.map(m=>`<option${m===FM?' selected':''}>${m}</option>`).join('')}</select><button class="btn bg bsm" style="height:34px" onclick="addMonth()">+ Month</button></div></div>`;

  if(FT==='ov') return hdr+`
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
    ${[{l:'Sale USD',v:nf(md.saleUSD,'$'),c:'var(--accent)'},{l:'Sale BDT',v:nf(saleBDT,'৳'),c:'var(--green)'},{l:'Total Expenses',v:nf(tExp,'৳'),c:'var(--red)'},{l:'Net Balance',v:nf(net,'৳'),c:net>=0?'var(--green)':'var(--red)'}].map(x=>`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${x.l}</div><div style="font-size:20px;font-weight:800;color:${x.c};line-height:1;letter-spacing:-0.5px">${x.v}</div></div>`).join('')}
  </div>
  <div class="card">
    <div class="ct">Monthly Inputs</div>
    <div class="g3" style="gap:10px">
      ${[{l:'Total Sale (USD)',k:'saleUSD',v:md.saleUSD||0},{l:'USD → BDT Rate',k:'rate',v:md.rate||115},{l:'Total Sale (BDT)',k:'saleBDT',v:md.saleBDT||0},{l:'Monthly Expenses (BDT)',k:'expense',v:md.expense||0},{l:'Advance Payment (BDT)',k:'advance',v:md.advance||0},{l:'Salary Advance (BDT)',k:'salAdv',v:md.salAdv||0},{l:'Previous Month (BDT)',k:'prevMonth',v:md.prevMonth||0}].map(f=>`<div><label class="il">${f.l}</label><input class="inp" type="number" value="${f.v}" onchange="uFin('${f.k}',this.value)" style="padding:8px 10px;font-size:12px"/></div>`).join('')}
    </div>
    <div class="fc gap8 mt16 fw">
      <button class="btn bp" onclick="recalc()">🔄 Auto-Calculate BDT</button>
      <div style="padding:8px 12px;background:var(--aBg);border-radius:var(--rs);font-size:11px;color:var(--accent);font-weight:600">${nf(md.saleUSD||0,'$')} × ${md.rate||115} = ${nf(calcBDT,'৳')}</div>
    </div>
  </div>`;

  if(FT==='gw') return hdr+`
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border)">
      <div class="gwr" style="border:none;padding:0"><span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">Gateway</span><span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">USD ($)</span><span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px">BDT (৳)</span></div>
    </div>
    <div style="padding:0 18px">
      ${GWS.map(gw=>{const v=md.gws?.[gw]||{usd:0,bdt:0};return `<div class="gwr"><span class="f12 semi">${gw}</span><input class="inp" type="number" value="${v.usd||''}" placeholder="0" onchange="uGW('${gw}','usd',this.value)" style="padding:5px 7px;font-size:11px"/><input class="inp" type="number" value="${v.bdt||''}" placeholder="0" onchange="uGW('${gw}','bdt',this.value)" style="padding:5px 7px;font-size:11px"/></div>`}).join('')}
      <div class="gwtot"><span>Total</span><span style="color:var(--accent)">$${gwU.toLocaleString()}</span><span style="color:var(--green)">৳${gwB.toLocaleString()}</span></div>
    </div>
  </div>`;

  return hdr+`
  <div class="card">
    <div class="ct">Summary — ${FM}</div>
    ${[{l:'Total Sale (USD)',v:nf(md.saleUSD,'$'),c:'var(--accent)'},{l:'Total Sale (BDT)',v:nf(saleBDT,'৳'),c:'var(--green)'},{l:'USD → BDT Rate',v:`${rate} BDT / $1`,c:'var(--t2)'},{l:'Gateway Collections (USD)',v:nf(gwU,'$'),c:'var(--accent)'},{l:'Gateway Collections (BDT)',v:nf(gwB,'৳'),c:'var(--green)'},{l:'Monthly Expenses',v:nf(md.expense,'৳'),c:'var(--red)'},{l:'Advance Payment',v:nf(md.advance,'৳'),c:'var(--red)'},{l:'Salary Advance',v:nf(md.salAdv,'৳'),c:'var(--red)'},{l:'Previous Month Balance',v:nf(md.prevMonth,'৳'),c:'var(--t2)'}].map(r=>`
    <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--t2);font-weight:500">${r.l}</span><span style="font-weight:700;color:${r.c}">${r.v}</span>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;padding:14px 0 0;font-size:15px;font-weight:800">
      <span>Net Balance (BDT)</span><span style="color:${net>=0?'var(--green)':'var(--red)'}">৳${net.toLocaleString()}</span>
    </div>
  </div>`;
}

// ── Dashboard
function rDash(){
  const tasks=gTasks(),done=tasks.filter(t=>t.status==='Done').length,tot=tasks.length;
  const high=tasks.filter(t=>t.priority==='High'&&t.status!=='Done').length;
  const ov=tasks.filter(t=>t.deadline&&t.deadline<td()&&t.status!=='Done').length;
  const blocks=gBlocks(),bDone=blocks.filter(b=>b.bs==='Completed').length;
  const ds=blocks.length?pc(bDone,blocks.length):0,dsc=ds>=75?'var(--green)':ds>=40?'var(--yellow)':'var(--red)';
  const hr=new Date().getHours(),gr=hr<12?'morning':hr<17?'afternoon':'evening';
  return `
  <div class="mb20">
    <div style="font-size:21px;font-weight:800;letter-spacing:-0.5px">Good ${gr} 👋</div>
    <div class="f12 cm" style="margin-top:3px">${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">
    <div style="background:linear-gradient(135deg,#4361ee,#7209b7);border:none;border-radius:var(--r);padding:16px;box-shadow:var(--shadow)">
      <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Completion</div>
      <div style="font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.8px;line-height:1">${pc(done,tot)}%</div>
      <div style="font-size:11px;color:rgba(255,255,255,.6);margin-top:5px">${done}/${tot} tasks</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Day Score</div>
      <div style="font-size:26px;font-weight:800;color:${dsc};letter-spacing:-0.8px;line-height:1">${ds}%</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">${bDone}/${blocks.length} blocks</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">High Priority</div>
      <div style="font-size:26px;font-weight:800;color:var(--red);letter-spacing:-0.8px;line-height:1">${high}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">need attention</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)">
      <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Overdue</div>
      <div style="font-size:26px;font-weight:800;color:${ov>0?'var(--red)':'var(--green)'};letter-spacing:-0.8px;line-height:1">${ov}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:5px">past due</div>
    </div>
  </div>
  <div class="g2 mb14">
    <div class="card">
      <div class="ct">Task Progress</div>
      ${pbar(pc(done,tot),'var(--accent)',8)}<div class="fb f11 cm mt8 mb14"><span>${done} done</span><span>${tot-done} left</span></div>
      ${[{l:'Todo',v:tasks.filter(t=>t.status==='Todo').length,c:'var(--muted)'},{l:'In Progress',v:tasks.filter(t=>t.status==='In Progress').length,c:'var(--accent)'},{l:'Done',v:done,c:'var(--green)'},{l:'Blocked',v:tasks.filter(t=>t.status==='Blocked').length,c:'var(--red)'}].map(r=>`<div class="fb f12 mb8"><span style="color:var(--t2);font-weight:500">${r.l}</span><span style="font-weight:700;color:${r.c}">${r.v}</span></div>`).join('')}
    </div>
    <div class="card">
      <div class="ct">Today's Blocks</div>
      ${blocks.slice(0,5).map(b=>`<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)"><div style="width:4px;height:30px;border-radius:99px;background:${b.color};flex-shrink:0"></div><div style="flex:1;overflow:hidden"><div class="f12 semi te">${esc(b.title)}</div><div class="f10 cm">${String(b.hour).padStart(2,'0')}:00 · ${b.dur}h</div></div>${bsb(b.bs,b.id)}</div>`).join('')}
      ${blocks.length===0?'<div class="f12 cm">No blocks yet.</div>':''}
    </div>
  </div>
  <div class="card">
    <div class="ct">High Priority Tasks</div>
    ${tasks.filter(t=>t.priority==='High'&&t.status!=='Done').slice(0,4).map(t=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap"><span class="f12 semi te" style="flex:1">${esc(t.title)}</span><div class="fc gap6">${sb(t.status)}<span class="f11 cm">${fd(t.deadline)}</span></div></div>`).join('')}
    ${high===0?'<div style="color:var(--green);font-size:12px;font-weight:600">✓ All caught up!</div>':''}
  </div>`;
}

// ── Render
function rp(){
  const el=$('pg');if(!el)return;
  switch(CP){
    case'dash':el.innerHTML=rDash();break;
    case'tasks':el.innerHTML=rTasks();break;
    case'routine':el.innerHTML=rRoutine();break;
    case'perf':el.innerHTML=rPerf();break;
    case'team':el.innerHTML=rTeam();break;
    case'proj':el.innerHTML=rProj();break;
    case'fin':el.innerHTML=rFin();break;
  }
  uBadges();
}

window.addEventListener('DOMContentLoaded',()=>{

Object.assign(window,{go,tSB,cSB,doAction,cM,oTM,svTask,delTask,cTS,oBM,svBlock,cBS,delBlock,oMM,svMember,oAT,svAT,cTTS,setRat,oPM,svProj,uFin,uGW,addMonth,recalc,svSnap,rp,gTasks,sTasks,gTeam,sTeam,gTT,sTT,gProj,sProj,gFin,sFin,gBlocks,sBlocks,$,TF,TQ,RV,FT,FM,TV,SMI});
</script>
