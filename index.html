<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>The Founder's OS</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Founder's OS"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Core surfaces */
  --bg:#0f1117;
  --bg-grad:radial-gradient(ellipse 80% 60% at 50% -10%, #1a1f35 0%, #0f1117 60%);
  --surface:#161925;
  --surface-glass:rgba(22,25,37,.7);
  --surface-2:#1e2233;
  --surface-3:#252a3d;
  --border:#2a3048;
  --border-hover:#3a4160;

  /* Text */
  --text:#f1f3fa;
  --text-2:#b4bbd2;
  --muted:#7a82a0;
  --faint:#4a5072;

  /* Brand — vibrant electric */
  --accent:#6366f1;     /* indigo */
  --accent-2:#8b5cf6;   /* violet */
  --accent-3:#ec4899;   /* pink */
  --accent-4:#06b6d4;   /* cyan */
  --accent-grad:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --accent-grad-2:linear-gradient(135deg,#06b6d4 0%,#6366f1 100%);

  /* Status colors (vibrant) */
  --green:#10d373;
  --green-glow:rgba(16,211,115,.15);
  --red:#ff3d5f;
  --red-glow:rgba(255,61,95,.15);
  --yellow:#ffb547;
  --yellow-glow:rgba(255,181,71,.15);
  --blue:#3b9dff;
  --blue-glow:rgba(59,157,255,.15);
  --purple:#b668ff;
  --purple-glow:rgba(182,104,255,.15);
  --orange:#ff7a3d;
  --orange-glow:rgba(255,122,61,.15);

  /* Radius */
  --r-lg:18px;
  --r-md:14px;
  --r-sm:10px;
  --r-xs:7px;

  /* Shadows */
  --shadow-1:0 1px 2px rgba(0,0,0,.3);
  --shadow-2:0 8px 24px rgba(0,0,0,.18);
  --shadow-3:0 20px 48px rgba(0,0,0,.32);
  --shadow-glow:0 0 0 1px rgba(99,102,241,.2),0 8px 32px rgba(99,102,241,.25);

  /* Fonts */
  --f-display:'Plus Jakarta Sans',sans-serif;
  --f-body:'Poppins',sans-serif;
}

html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
body{
  font-family:var(--f-body);
  background:var(--bg);
  background-image:var(--bg-grad);
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  font-weight:400;
}
button,input,select,textarea{font-family:inherit;color:inherit}

/* Ambient background glow */
body::before{
  content:'';
  position:fixed;
  top:-10%;left:-5%;
  width:40vw;height:40vw;
  background:radial-gradient(circle,rgba(99,102,241,.12) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}
body::after{
  content:'';
  position:fixed;
  bottom:-20%;right:-10%;
  width:50vw;height:50vw;
  background:radial-gradient(circle,rgba(236,72,153,.08) 0%,transparent 70%);
  pointer-events:none;
  z-index:0;
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
::-webkit-scrollbar-track{background:transparent}

/* ── Layout ── */
#app{display:flex;min-height:100vh;position:relative;z-index:1}

.sidebar{
  width:244px;
  background:var(--surface-glass);
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  border-right:1px solid var(--border);
  position:fixed;top:0;left:0;
  height:100vh;
  display:flex;flex-direction:column;
  z-index:100;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
}
.s-brand{padding:22px 18px 18px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border)}
.s-logo{
  width:40px;height:40px;
  background:var(--accent-grad);
  border-radius:12px;
  display:grid;place-items:center;
  color:#fff;font-family:var(--f-display);
  font-weight:800;font-size:18px;
  box-shadow:0 8px 20px rgba(99,102,241,.4),inset 0 1px 0 rgba(255,255,255,.2);
  position:relative;
}
.s-logo::after{
  content:'';position:absolute;inset:0;
  border-radius:12px;
  background:linear-gradient(135deg,rgba(255,255,255,.25),transparent 60%);
}
.s-name{font-family:var(--f-display);font-size:14px;font-weight:800;line-height:1.15;letter-spacing:-0.2px}
.s-tag{font-size:10px;font-weight:500;color:var(--muted);margin-top:2px;letter-spacing:.3px}

.s-nav{flex:1;padding:14px 10px;overflow-y:auto}
.s-section{
  font-size:10px;font-weight:700;
  color:var(--faint);
  text-transform:uppercase;
  letter-spacing:1.4px;
  padding:10px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;
  border-radius:var(--r-sm);
  cursor:pointer;
  color:var(--text-2);
  font-size:13px;font-weight:500;
  margin-bottom:2px;
  border:none;background:none;
  width:100%;text-align:left;
  transition:all .15s;
  position:relative;
}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{
  background:linear-gradient(90deg,rgba(99,102,241,.15),rgba(139,92,246,.08));
  color:var(--text);
  font-weight:600;
}
.nav-item.active::before{
  content:'';
  position:absolute;left:0;top:20%;bottom:20%;
  width:3px;border-radius:0 3px 3px 0;
  background:var(--accent-grad);
}
.nav-ic{
  font-size:17px;width:24px;height:24px;
  display:grid;place-items:center;flex-shrink:0;
  opacity:.85;
}
.nav-item.active .nav-ic{opacity:1}
.nav-badge{
  margin-left:auto;
  background:var(--red);color:#fff;
  border-radius:99px;
  padding:1px 7px;font-size:10px;font-weight:700;
  box-shadow:0 2px 8px rgba(255,61,95,.4);
}
.s-foot{padding:14px 16px;border-top:1px solid var(--border)}
.pend-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.1));
  color:var(--accent);
  border:1px solid rgba(99,102,241,.2);
  border-radius:99px;
  padding:5px 12px;font-size:11px;font-weight:600;
}
.pend-pill .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Main ── */
.main{flex:1;margin-left:244px;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  background:var(--surface-glass);
  backdrop-filter:blur(16px) saturate(140%);
  -webkit-backdrop-filter:blur(16px) saturate(140%);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:62px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.tb-title{font-family:var(--f-display);font-size:17px;font-weight:800;letter-spacing:-0.3px}
.tb-date{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
.page{padding:24px 28px;flex:1;position:relative;z-index:1}

/* ── Cards ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:20px 22px;
  box-shadow:var(--shadow-2);
  transition:border-color .2s,transform .2s;
  position:relative;
}
.card-sm{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:16px 18px;
}
.card-title{
  font-family:var(--f-display);
  font-size:11px;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:16px;
}

/* ── Stat Cards ── */
.stat-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:18px;
  box-shadow:var(--shadow-2);
  position:relative;
  overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-3)}
.stat-card.accent{
  background:linear-gradient(135deg,#6366f1,#8b5cf6 50%,#ec4899);
  border:none;
}
.stat-card.accent::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at top right,rgba(255,255,255,.2),transparent 60%);
}
.stat-label{
  font-size:10px;font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.8px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.stat-card.accent .stat-label{color:rgba(255,255,255,.85)}
.stat-icon{
  width:22px;height:22px;
  background:var(--surface-3);
  border-radius:6px;
  display:grid;place-items:center;
  font-size:12px;
}
.stat-card.accent .stat-icon{background:rgba(255,255,255,.15)}
.stat-val{
  font-family:var(--f-display);
  font-size:28px;font-weight:800;
  letter-spacing:-1.2px;line-height:1;
}
.stat-card.accent .stat-val{color:#fff}
.stat-sub{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500}
.stat-card.accent .stat-sub{color:rgba(255,255,255,.7)}

/* ── Progress Bar ── */
.pb{
  background:var(--surface-3);
  border-radius:99px;
  overflow:hidden;
  position:relative;
}
.pf{
  border-radius:99px;
  transition:width .7s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
.pf::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  animation:shimmer 2s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ── Badges ── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:6px;
  padding:3px 9px;
  font-size:10px;font-weight:700;
  white-space:nowrap;
  letter-spacing:.2px;
  border:1px solid transparent;
}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;
  border-radius:var(--r-sm);
  padding:9px 16px;
  font-size:12.5px;font-weight:600;
  cursor:pointer;
  transition:all .18s;
  font-family:var(--f-body);
  letter-spacing:.2px;
  white-space:nowrap;
}
.btn-primary{
  background:var(--accent-grad);
  color:#fff;
  box-shadow:0 4px 14px rgba(99,102,241,.4),inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.5)}
.btn-ghost{
  background:var(--surface-2);
  color:var(--text);
  border:1px solid var(--border);
}
.btn-ghost:hover{background:var(--surface-3);border-color:var(--border-hover)}
.btn-sm{padding:6px 12px;font-size:11.5px}
.btn-danger{
  background:linear-gradient(135deg,#ff3d5f,#ff7a3d);
  color:#fff;
  box-shadow:0 4px 14px rgba(255,61,95,.35);
}

/* ── Inputs ── */
.inp{
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  padding:10px 13px;
  font-size:13px;
  color:var(--text);
  background:var(--surface-2);
  width:100%;
  outline:none;
  transition:all .18s;
  font-family:var(--f-body);
  font-weight:400;
}
.inp:focus{
  border-color:var(--accent);
  background:var(--surface-3);
  box-shadow:0 0 0 3px rgba(99,102,241,.15);
}
.inp::placeholder{color:var(--faint)}
.ig{margin-bottom:14px}
.il{
  font-size:11px;font-weight:600;
  color:var(--text-2);
  margin-bottom:6px;
  display:block;
  text-transform:uppercase;
  letter-spacing:.6px;
}
textarea.inp{resize:vertical;min-height:76px;line-height:1.6}
select.inp{cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%237a82a0' d='M5 6L0 0h10z'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:30px}

/* Toggle / Checkbox */
.toggle{
  display:inline-flex;align-items:center;gap:10px;
  cursor:pointer;user-select:none;
}
.toggle-slider{
  width:38px;height:22px;
  background:var(--surface-3);
  border-radius:99px;
  position:relative;
  transition:background .2s;
  flex-shrink:0;
}
.toggle-slider::after{
  content:'';position:absolute;
  top:2px;left:2px;
  width:18px;height:18px;
  border-radius:50%;
  background:#fff;
  transition:transform .2s;
  box-shadow:0 2px 4px rgba(0,0,0,.3);
}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::after{transform:translateX(16px)}
.toggle input{display:none}

/* Radio pills */
.radio-group{display:flex;gap:6px;flex-wrap:wrap}
.radio-pill{
  padding:7px 14px;
  border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  background:var(--surface-2);
  color:var(--text-2);
  font-size:12px;font-weight:600;
  cursor:pointer;
  transition:all .15s;
  font-family:inherit;
}
.radio-pill.on{
  background:var(--accent-grad);
  color:#fff;
  border-color:transparent;
  box-shadow:0 4px 12px rgba(99,102,241,.3);
}

/* ── Modal ── */
.mo{
  position:fixed;inset:0;
  background:rgba(9,11,20,.7);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:400;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  animation:fadeIn .2s ease;
}
.mb{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:26px;
  width:100%;max-width:520px;
  max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-3);
  animation:scaleIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-family:var(--f-display);font-size:17px;font-weight:800;letter-spacing:-0.3px}
.mc{
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  width:30px;height:30px;
  cursor:pointer;
  font-size:16px;color:var(--muted);
  display:grid;place-items:center;
  transition:all .15s;
}
.mc:hover{background:var(--surface-3);color:var(--text)}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:22px}

/* ── Timeline ── */
.trow{display:flex;min-height:54px;border-bottom:1px solid var(--border);position:relative}
.trow.now{background:linear-gradient(90deg,rgba(99,102,241,.06),transparent 40%)}
.thour{
  min-width:72px;
  padding:10px 10px 0 0;
  text-align:right;
  font-size:10.5px;font-weight:700;
  font-family:var(--f-display);
  flex-shrink:0;
  letter-spacing:.3px;
}
.tcontent{
  flex:1;
  padding:6px 0 6px 14px;
  border-left:2px solid var(--border);
  display:flex;gap:7px;flex-wrap:wrap;align-items:flex-start;
}
.bcard{
  border-radius:var(--r-sm);
  padding:8px 12px;
  cursor:pointer;
  min-width:154px;
  transition:all .15s;
  border:1px solid;
  backdrop-filter:blur(6px);
}
.bcard:hover{transform:translateY(-1px);box-shadow:var(--shadow-2)}
.bt{font-size:12px;font-weight:700;margin-bottom:5px;line-height:1.2}
.bm{display:flex;gap:5px;align-items:center;flex-wrap:wrap}

/* ── Finance Gateways ── */
.gwr{
  display:grid;
  grid-template-columns:2fr 1fr 1fr;
  gap:10px;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  align-items:center;
}
.gwr:hover{background:rgba(99,102,241,.03);margin:0 -6px;padding:8px 6px;border-radius:var(--r-xs)}

/* ── Mobile Nav ── */
.mnav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface-glass);
  backdrop-filter:blur(24px) saturate(140%);
  -webkit-backdrop-filter:blur(24px) saturate(140%);
  border-top:1px solid var(--border);
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -10px 30px rgba(0,0,0,.3);
}
.mni{display:flex;justify-content:space-around;padding:6px 0}
.mnb{
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 10px;
  min-width:44px;
  position:relative;
}
.mnb-ic{font-size:18px;line-height:1;transition:transform .15s}
.mnb.on .mnb-ic{transform:scale(1.15)}
.mnb-lbl{font-size:9px;font-weight:600;color:var(--muted);transition:color .15s}
.mnb.on .mnb-lbl{
  background:var(--accent-grad);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:700;
}

/* Overlay */
.so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:99}
.ham{
  display:none;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  width:38px;height:38px;
  cursor:pointer;
  font-size:16px;
  color:var(--text);
  align-items:center;justify-content:center;
}

/* ── Helpers ── */
.g-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.fb{display:flex;justify-content:space-between;align-items:center}
.fc{display:flex;align-items:center}
.fw{flex-wrap:wrap}
.te{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.w100{width:100%}
.gap-4{gap:4px}.gap-6{gap:6px}.gap-8{gap:8px}.gap-10{gap:10px}.gap-12{gap:12px}.gap-14{gap:14px}.gap-16{gap:16px}
.mb-6{margin-bottom:6px}.mb-8{margin-bottom:8px}.mb-10{margin-bottom:10px}.mb-12{margin-bottom:12px}.mb-14{margin-bottom:14px}.mb-16{margin-bottom:16px}.mb-18{margin-bottom:18px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}
.mt-6{margin-top:6px}.mt-8{margin-top:8px}.mt-10{margin-top:10px}.mt-12{margin-top:12px}.mt-14{margin-top:14px}.mt-16{margin-top:16px}
.f-10{font-size:10px}.f-11{font-size:11px}.f-12{font-size:12px}.f-13{font-size:13px}.f-14{font-size:14px}
.semi{font-weight:600}.bold{font-weight:700}.x-bold{font-weight:800}
.display{font-family:var(--f-display)}
.c-muted{color:var(--muted)}.c-text2{color:var(--text-2)}.c-accent{color:var(--accent)}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}.c-blue{color:var(--blue)}
.grad-text{background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

/* Recurring icon */
.recur-tag{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;
  border-radius:5px;
  font-size:10px;font-weight:600;
  background:linear-gradient(135deg,rgba(139,92,246,.18),rgba(236,72,153,.14));
  border:1px solid rgba(139,92,246,.25);
  color:var(--accent-2);
}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page>*{animation:fadeUp .3s cubic-bezier(.34,1.56,.64,1) backwards}
.page>*:nth-child(1){animation-delay:.02s}

<body>

  <aside class="sidebar" id="sb">

      <div>
        <div class="s-name">Founder's OS</div>

      <button class="mnb" onclick="go('tasks',this,1)"><span class="mnb-ic">✓</span><span class="mnb-lbl">Tasks</span></button>
      <button class="mnb" onclick="go('routine',this,1)"><span class="mnb-ic">◷</span><span class="mnb-lbl">Routine</span></button>
      <button class="mnb" onclick="go('team',this,1)"><span class="mnb-ic">◎</span><span class="mnb-lbl">Team</span></button>

<div class="mo" id="modal" style="display:none" onclick="if(event.target===this)cM()">
  <div class="mb">
    <div class="mh"><div class="mt" id="mtitle"></div><button class="mc" onclick="cM()">×</button></div>
    <div id="mbody"></div>
    <div class="mf" id="mfoot"></div>
  </div>
</div>

<script>
// ── STORAGE
const ls={
  g:(k,d)=>{try{const v=localStorage.getItem('fos5_'+k);return v?JSON.parse(v):d}catch(e){return d}},
  s:(k,v)=>{try{localStorage.setItem('fos5_'+k,JSON.stringify(v))}catch(e){}}
};

// ── HELPERS
const uid=()=>Math.random().toString(36).slice(2,9);
const td=()=>new Date().toISOString().slice(0,10);
const dayOfWeek=()=>new Date().getDay(); // 0=Sun..6=Sat
const fd=d=>d?new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
const pc=(a,b)=>b?Math.round(a/b*100):0;
const nf=(n,p='')=>`${p}${(+n||0).toLocaleString()}`;
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtHour=h=>{if(h===0)return'12:00 AM';if(h===12)return'12:00 PM';return h<12?`${h}:00 AM`:`${h-12}:00 PM`};

// ── CONFIG
const GWS=['Indian Pending','Binance 1','Binance 2','Binance 3','Redot Pay','bKash','Nagad','DBBL','Web Dev','BRAC Bank','Shefat Bank','Nabil Bank','Shaheed Bank','Sayem Bank','Cash','Marketplace','Payoneer','Stripe','Nsave','Payoneer Business','Wise','Zelle','CashApp'];
const HRS=Array.from({length:24},(_,i)=>i);
const BCS=['#6366f1','#8b5cf6','#ec4899','#06b6d4','#10d373','#ffb547','#ff7a3d','#ff3d5f'];
const BST=['Not Started','Pending','Working','Completed'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAYS_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const BSM={
  'Not Started':{c:'var(--muted)',bg:'rgba(122,130,160,.12)',border:'rgba(122,130,160,.22)',i:'○'},
  'Pending':{c:'var(--yellow)',bg:'var(--yellow-glow)',border:'rgba(255,181,71,.3)',i:'◔'},
  'Working':{c:'var(--blue)',bg:'var(--blue-glow)',border:'rgba(59,157,255,.3)',i:'◑'},
  'Completed':{c:'var(--green)',bg:'var(--green-glow)',border:'rgba(16,211,115,.3)',i:'●'}
};
const PM={
  High:{c:'var(--red)',bg:'var(--red-glow)',border:'rgba(255,61,95,.28)'},
  Medium:{c:'var(--yellow)',bg:'var(--yellow-glow)',border:'rgba(255,181,71,.28)'},
  Low:{c:'var(--green)',bg:'var(--green-glow)',border:'rgba(16,211,115,.28)'}
};
const SM={
  Todo:{c:'var(--muted)',bg:'rgba(122,130,160,.12)',border:'rgba(122,130,160,.22)'},
  'In Progress':{c:'var(--blue)',bg:'var(--blue-glow)',border:'rgba(59,157,255,.3)'},
  Done:{c:'var(--green)',bg:'var(--green-glow)',border:'rgba(16,211,115,.3)'},
  Blocked:{c:'var(--red)',bg:'var(--red-glow)',border:'rgba(255,61,95,.3)'}
};

// ── SEED DATA
const DT=[
  {id:uid(),title:'Client proposal – Zenith Co.',details:'Revised pricing + new scope',priority:'High',status:'In Progress',deadline:'2026-04-06',created:td(),recurring:'none'},
  {id:uid(),title:'Daily LinkedIn outreach',details:'Message 15 leads & follow up',priority:'Medium',status:'Todo',deadline:'',created:td(),recurring:'daily'},
  {id:uid(),title:'Weekly team sync',details:'Monday standup with leads',priority:'Medium',status:'Todo',deadline:'',created:td(),recurring:'weekly',recurDay:1},
  {id:uid(),title:'Send invoice – NovaBrand',details:'2nd reminder',priority:'High',status:'Todo',deadline:'2026-04-04',created:td(),recurring:'none'},
];
const DB=[
  {id:uid(),title:'Morning Standup',hour:9,dur:1,pri:'Medium',bs:'Not Started',color:'#6366f1',notes:''},
  {id:uid(),title:'Client Call – Zenith',hour:11,dur:1,pri:'High',bs:'Not Started',color:'#ec4899',notes:'Prepare deck'},
  {id:uid(),title:'Deep Work',hour:14,dur:2,pri:'High',bs:'Not Started',color:'#8b5cf6',notes:''},
  {id:uid(),title:'EOD Review',hour:17,dur:1,pri:'Low',bs:'Not Started',color:'#10d373',notes:''}
];
const DTEAM=[
  {id:uid(),name:'Riya Islam',dept:'Design',role:'Senior Designer',rating:4},
  {id:uid(),name:'Ahmed Hossain',dept:'Development',role:'Frontend Dev',rating:5},
  {id:uid(),name:'Priya Das',dept:'Content',role:'Copywriter',rating:3}
];
const DP=[
  {id:uid(),name:'Zenith Co. Rebrand',client:'Zenith Co.',status:'In Progress',deadline:'2026-05-01',budget:5000,spent:2200,desc:'Brand identity + website',progress:45},
  {id:uid(),name:'NovaBrand Campaign',client:'NovaBrand',status:'In Progress',deadline:'2026-04-20',budget:3000,spent:2800,desc:'Social media & ads',progress:80},
  {id:uid(),name:'Internal Website',client:'Internal',status:'Todo',deadline:'2026-06-01',budget:1500,spent:0,desc:'Agency portfolio',progress:0}
];
const DF={months:{'2026-04':{saleUSD:0,saleBDT:0,rate:115,expense:0,advance:0,salAdv:0,prevMonth:0,gws:Object.fromEntries(GWS.map(g=>[g,{usd:0,bdt:0}]))}}};

// ── STATE
let CP='dash',TF='All',TQ='',RV='tl',FT='ov',FM='2026-04',TV='list',SMI=null;

// ── BADGE / PBAR
function bdg(t,c,bg,border){return `<span class="badge" style="color:${c};background:${bg};border-color:${border||'transparent'}">${t}</span>`}
function pb(p){const m=PM[p]||PM.Low;return bdg(p,m.c,m.bg,m.border)}
function sb(s){const m=SM[s]||SM.Todo;return bdg(s,m.c,m.bg,m.border)}
function bsb(s,id){const m=BSM[s]||BSM['Not Started'];return `<span class="badge" style="color:${m.c};background:${m.bg};border-color:${m.border};cursor:pointer" onclick="cBS('${id}')">${m.i} ${s}</span>`}
function pbar(v,c='var(--accent)',h=6){return `<div class="pb" style="height:${h}px"><div class="pf" style="width:${Math.min(v,100)}%;height:100%;background:${c}"></div></div>`}

// ── NAV
const TITLES={dash:'Dashboard',tasks:'My Tasks',routine:'Daily Routine',perf:'Performance',team:'Team',proj:'Projects',fin:'Finance'};
const ACTS={dash:'',tasks:'+ New Task',routine:'+ Add Block',perf:'',team:'+ Add Member',proj:'+ New Project',fin:''};

function go(p,el,mob=0){
  CP=p;
  $('pg-title').textContent=TITLES[p]||p;
  const a=ACTS[p];
  $('act-btn').textContent=a;
  $('act-btn').style.display=a?'inline-flex':'none';
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll(`.nav-item[onclick*="go('${p}'"]`).forEach(n=>n.classList.add('active'));
  document.querySelectorAll('.mnb').forEach(b=>b.classList.remove('on'));
  if(mob&&el)el.classList.add('on');
  if(mob)cSB();
  rp();
  window.scrollTo(0,0);
}
function doAction(){
  if(CP==='tasks')oTM();
  else if(CP==='routine')oBM();
  else if(CP==='team')oMM();
  else if(CP==='proj')oPM();
}
function tSB(){$('sb').classList.toggle('open');$('so').classList.toggle('show')}
function cSB(){$('sb').classList.remove('open');$('so').classList.remove('show')}

// ── MODAL
function oModal(title,body,foot){$('mtitle').textContent=title;$('mbody').innerHTML=body;$('mfoot').innerHTML=foot;$('modal').style.display='flex'}
function cM(){$('modal').style.display='none'}
function ig(label,html){return `<div class="ig"><label class="il">${label}</label>${html}</div>`}
function ti(id,v='',ph='',t='text'){return `<input class="inp" id="${id}" type="${t}" value="${esc(v)}" placeholder="${ph}"/>`}
function si(id,opts,v){return `<select class="inp" id="${id}">${opts.map(o=>`<option${o===v?' selected':''}>${o}</option>`).join('')}</select>`}
function rg(...items){return `<div style="display:grid;grid-template-columns:${items.map(()=>'1fr').join(' ')};gap:10px">${items.join('')}</div>`}

// ── TASKS ─────────────────────────────────────────────────────────────────────
function gTasks(){return ls.g('tasks',DT)}
function sTasks(t){ls.s('tasks',t);uBadges()}
function uBadges(){
  const tasks=gTasks(),n=tasks.filter(t=>!isDone(t)).length;
  $('tb').textContent=n;$('tb').style.display=n?'':'none';$('pc').textContent=n;
}

// Recurring task logic — a recurring task is "effectively done" if today's date is in doneDates
function isDone(t){
  if(t.recurring==='none'||!t.recurring)return t.status==='Done';
  const today=td();
  return (t.doneDates||[]).includes(today);
}
function isActiveToday(t){
  if(t.recurring==='none'||!t.recurring)return true;
  if(t.recurring==='daily')return true;
  if(t.recurring==='weekly')return t.recurDay===dayOfWeek();
  return false;
}

function oTM(task=null){
  const e=!!task,x=task||{title:'',details:'',priority:'Medium',status:'Todo',deadline:'',recurring:'none',recurDay:1};
  const recurOpts=`
    <div class="radio-group mt-6">
      <button type="button" class="radio-pill ${x.recurring==='none'?'on':''}" onclick="setRecur('none')">One-time</button>
      <button type="button" class="radio-pill ${x.recurring==='daily'?'on':''}" onclick="setRecur('daily')">Daily</button>
      <button type="button" class="radio-pill ${x.recurring==='weekly'?'on':''}" onclick="setRecur('weekly')">Weekly</button>
    </div>
    <input type="hidden" id="t_recur" value="${x.recurring||'none'}"/>
    <div id="t_recur_day_wrap" style="margin-top:10px;display:${x.recurring==='weekly'?'block':'none'}">
      <label class="il">Repeat on</label>
      <div class="radio-group">
        ${DAYS.map((d,i)=>`<button type="button" class="radio-pill ${x.recurDay===i?'on':''}" onclick="setRecurDay(${i})">${d}</button>`).join('')}
      </div>
      <input type="hidden" id="t_recur_day" value="${x.recurDay||1}"/>
    </div>`;
  oModal(e?'Edit Task':'New Task',
    ig('Task Title *',ti('t_t',x.title,'What needs to be done?'))+
    ig('Details',`<textarea class="inp" id="t_d" placeholder="Additional context…">${esc(x.details||'')}</textarea>`)+
    rg(ig('Priority',si('t_p',['High','Medium','Low'],x.priority)),ig('Status',si('t_s',['Todo','In Progress','Done','Blocked'],x.status||'Todo')),ig('Deadline',ti('t_dl',x.deadline||'','','date')))+
    ig('Repeat',recurOpts),
    `<button class="btn btn-ghost" onclick="cM()">Cancel</button><button class="btn btn-primary" onclick="svTask('${e?x.id:''}')">${e?'Save':'Add Task'}</button>`
  );
}
function setRecur(val){
  $('t_recur').value=val;
  document.querySelectorAll('#mbody .radio-group').forEach((g,gi)=>{
    if(gi===0)g.querySelectorAll('.radio-pill').forEach((p,i)=>{p.classList.toggle('on',['none','daily','weekly'][i]===val)});
  });
  $('t_recur_day_wrap').style.display=val==='weekly'?'block':'none';
}
function setRecurDay(i){
  $('t_recur_day').value=i;
  document.querySelectorAll('#t_recur_day_wrap .radio-pill').forEach((p,idx)=>p.classList.toggle('on',idx===i));
}
function svTask(id){
  const title=$('t_t').value.trim();if(!title){alert('Title required');return}
  const tasks=gTasks();
  const recurring=$('t_recur').value;
  const recurDay=recurring==='weekly'?+$('t_recur_day').value:null;
  const existing=id?tasks.find(x=>x.id===id):null;
  const t={
    id:id||uid(),title,details:$('t_d').value,
    priority:$('t_p').value,status:$('t_s').value,
    deadline:$('t_dl').value,
    created:existing?existing.created:td(),
    recurring,recurDay,
    doneDates:existing?existing.doneDates||[]:[]
  };
  sTasks(id?tasks.map(x=>x.id===id?t:x):[...tasks,t]);
  cM();rp();
}
function delTask(id){if(confirm('Delete this task?')){sTasks(gTasks().filter(t=>t.id!==id));rp()}}

function cTS(id){
  const tasks=gTasks();const t=tasks.find(x=>x.id===id);if(!t)return;
  if(t.recurring!=='none'&&t.recurring){
    const today=td();
    const dd=t.doneDates||[];
    const newDD=dd.includes(today)?dd.filter(d=>d!==today):[...dd,today];
    sTasks(tasks.map(x=>x.id===id?{...x,doneDates:newDD}:x));
  }else{
    const order=['Todo','In Progress','Done','Blocked'];
    sTasks(tasks.map(x=>x.id===id?{...x,status:order[(order.indexOf(x.status)+1)%order.length]}:x));
  }
  rp();
}

function rTasks(){
  const allTasks=gTasks();
  const tasks=allTasks.filter(t=>isActiveToday(t));
  const fl=tasks.filter(t=>{
    const matchSearch=t.title.toLowerCase().includes(TQ.toLowerCase());
    if(!matchSearch)return false;
    if(TF==='All')return true;
    if(TF==='Recurring')return t.recurring&&t.recurring!=='none';
    if(TF==='Done')return isDone(t);
    if(t.recurring!=='none'&&t.recurring)return TF==='Todo'&&!isDone(t);
    return t.status===TF;
  });
  const pending=tasks.filter(t=>!isDone(t)).length;
  const doneCount=tasks.filter(t=>isDone(t)).length;
  const recurCount=tasks.filter(t=>t.recurring&&t.recurring!=='none').length;
  return `
  <div class="fb fw gap-10 mb-18">
    <div>
      <div class="display f-12 semi c-muted" style="text-transform:uppercase;letter-spacing:1px">Today's Tasks</div>
      <div class="f-13 c-text2 mt-6">${pending} pending · ${doneCount} done${recurCount>0?` · ${recurCount} recurring`:''}</div>
    </div>
    <input class="inp" style="max-width:220px" placeholder="🔍 Search…" value="${esc(TQ)}" oninput="TQ=this.value;rp()"/>
  </div>
  <div class="fc gap-6 mb-16 fw">
    ${['All','Todo','In Progress','Done','Blocked','Recurring'].map(s=>`<button onclick="TF='${s}';rp()" class="radio-pill ${TF===s?'on':''}">${s}</button>`).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    ${fl.length===0?'<div style="padding:28px;color:var(--muted);font-size:13px;text-align:center">No tasks match.</div>':''}
    ${fl.map(t=>{
      const done=isDone(t);
      const isRec=t.recurring&&t.recurring!=='none';
      return `
    <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:28px 1fr auto auto auto auto;gap:12px;align-items:center;transition:background .15s" onmouseover="this.style.background='rgba(99,102,241,.03)'" onmouseout="this.style.background='transparent'">
      <div onclick="cTS('${t.id}')" style="width:22px;height:22px;border-radius:7px;border:2px solid ${done?'var(--green)':'var(--border-hover)'};background:${done?'var(--green)':'transparent'};cursor:pointer;display:grid;place-items:center;transition:all .15s;color:#fff;font-size:11px;font-weight:800">${done?'✓':''}</div>
      <div style="cursor:pointer;overflow:hidden" onclick='oTM(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
        <div class="semi f-13 te" style="text-decoration:${done?'line-through':'none'};color:${done?'var(--muted)':'var(--text)'}">${esc(t.title)}</div>
        ${t.details?`<div class="f-11 c-muted te mt-6" style="margin-top:3px">${esc(t.details.slice(0,70))}${t.details.length>70?'…':''}</div>`:''}
      </div>
      ${isRec?`<span class="recur-tag">⟳ ${t.recurring==='daily'?'Daily':'Weekly · '+DAYS[t.recurDay]}</span>`:'<span></span>'}
      ${pb(t.priority)}
      ${isRec?'<span></span>':`<span class="f-11 c-muted" style="white-space:nowrap">${fd(t.deadline)}</span>`}
      <button onclick="delTask('${t.id}')" style="background:var(--surface-2);border:1px solid var(--border);cursor:pointer;color:var(--muted);border-radius:6px;width:26px;height:26px;font-size:14px;transition:all .15s" onmouseover="this.style.color='var(--red)';this.style.borderColor='var(--red)'" onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border)'">×</button>
    </div>`;}).join('')}
  </div>`;
}

// ── ROUTINE ───────────────────────────────────────────────────────────────────
function gBlocks(){return ls.g('blocks',DB)}
function sBlocks(b){ls.s('blocks',b)}
function oBM(bl=null){
  const e=!!bl,b=bl||{title:'',hour:9,dur:1,pri:'Medium',bs:'Not Started',color:'#6366f1',notes:'',tid:null};
  const tasks=gTasks().filter(t=>!isDone(t)&&isActiveToday(t));
  oModal(e?'Edit Block':'Add Time Block',
    ig('Title *',ti('b_t',b.title,'e.g. Deep Work…'))+
    rg(ig('Start Hour',`<select class="inp" id="b_h">${HRS.map(h=>`<option value="${h}"${h===b.hour?' selected':''}>${fmtHour(h)}</option>`).join('')}</select>`),ig('Duration',`<select class="inp" id="b_d">${[1,2,3,4].map(d=>`<option value="${d}"${d===b.dur?' selected':''}>${d}h</option>`).join('')}</select>`),ig('Priority',si('b_p',['High','Medium','Low'],b.pri)))+
    rg(ig('Status',`<select class="inp" id="b_s">${BST.map(s=>`<option${s===b.bs?' selected':''}>${s}</option>`).join('')}</select>`),ig('Link Task',`<select class="inp" id="b_tk"><option value="">— None —</option>${tasks.map(t=>`<option value="${t.id}"${t.id===b.tid?' selected':''}>${esc(t.title)}</option>`).join('')}</select>`))+
    ig('Color',`<div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">${BCS.map(c=>`<div onclick="document.getElementById('b_c').value='${c}'" style="width:26px;height:26px;border-radius:8px;background:${c};cursor:pointer;border:${c===b.color?'3px solid #fff':'3px solid transparent'};box-shadow:${c===b.color?'0 0 0 2px '+c:'0 2px 6px rgba(0,0,0,.25)'};transition:all .15s"></div>`).join('')}<input type="hidden" id="b_c" value="${b.color}"/></div>`)+
    ig('Notes',`<textarea class="inp" id="b_n" placeholder="Prep notes…">${esc(b.notes||'')}</textarea>`),

// ── PERFORMANCE ───────────────────────────────────────────────────────────────
function svSnap(){
  const tasks=gTasks().filter(t=>isActiveToday(t));
  const tot=tasks.length,done=tasks.filter(t=>isDone(t)).length;
  const ov=tasks.filter(t=>t.deadline&&t.deadline<td()&&!isDone(t)).length;
  const ot=tasks.filter(t=>isDone(t)&&t.deadline&&t.deadline>=t.created).length;
  const acc=done?pc(ot,done):0;
  const blocks=gBlocks(),bDone=blocks.filter(b=>b.bs==='Completed').length;
  const ds=blocks.length?pc(bDone,blocks.length):0;
  const hist=ls.g('hist',[]);
  hist.unshift({id:uid(),date:td(),tot,done,ov,acc,ds,comp:pc(done,tot),ip:tasks.filter(t=>t.status==='In Progress').length});
  ls.s('hist',hist.slice(0,30));rp();
}
function rPerf(){
  const tasks=gTasks().filter(t=>isActiveToday(t));
  const tot=tasks.length,done=tasks.filter(t=>isDone(t)).length;
  const ip=tasks.filter(t=>t.status==='In Progress'&&!isDone(t)).length;
  const bl=tasks.filter(t=>t.status==='Blocked'&&!isDone(t)).length;
  const todo_=tasks.filter(t=>!isDone(t)&&t.status!=='In Progress'&&t.status!=='Blocked').length;
  const ov=tasks.filter(t=>t.deadline&&t.deadline<td()&&!isDone(t)).length;
  const ot=tasks.filter(t=>isDone(t)&&t.deadline&&t.deadline>=t.created).length;
  const acc=done?pc(ot,done):0,comp=pc(done,tot);
  const blocks=gBlocks(),bDone=blocks.filter(b=>b.bs==='Completed').length;
  const ds=blocks.length?pc(bDone,blocks.length):0,dsc=ds>=75?'var(--green)':ds>=40?'var(--yellow)':'var(--red)';
  const hist=ls.g('hist',[]);
  return `
  <div class="g-4 mb-18">
    ${[
      {l:'Completion',v:`${comp}%`,c:'var(--green)',s:`${done}/${tot} tasks`,ic:'✓'},
      {l:'Accuracy',v:`${acc}%`,c:'var(--blue)',s:'on-time delivery',ic:'⊕'},
      {l:"Today's Score",v:`${ds}%`,c:dsc,s:`${bDone}/${blocks.length} blocks`,ic:'⏱'},
      {l:'Overdue',v:ov,c:ov>0?'var(--red)':'var(--green)',s:'past due',ic:'⚠'}
    ].map(x=>`
    <div class="stat-card">
      <div class="stat-label"><span class="stat-icon">${x.ic}</span>${x.l}</div>

    </div>`).join('')}
  </div>
  <div class="g-2 mb-16">
    <div class="card">
      <div class="card-title">Status Breakdown</div>
      ${pbar(comp,'var(--green)',8)}<div class="fb f-11 c-muted mt-10 mb-16"><span>${done} done</span><span>${tot-done} remaining</span></div>
      ${[{l:'Todo',v:todo_,c:'var(--muted)'},{l:'In Progress',v:ip,c:'var(--blue)'},{l:'Done',v:done,c:'var(--green)'},{l:'Blocked',v:bl,c:'var(--red)'}].map(r=>`
      <div class="fb f-12 mb-12"><span class="c-text2 semi">${r.l}</span><div class="fc gap-8"><div style="width:80px;height:4px;background:var(--surface-3);border-radius:99px;overflow:hidden"><div style="width:${pc(r.v,tot)}%;height:100%;background:${r.c};border-radius:99px"></div></div><span class="bold" style="color:${r.c};min-width:20px;text-align:right">${r.v}</span></div></div>`).join('')}

    </div>

    ${hist.length===0?`<div class="c-muted f-12" style="text-align:center;padding:20px 0">No history yet.<br>Click "Save Today's Snapshot" to start tracking.</div>`:''}
    ${hist.slice(0,10).map(h=>`
    <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="width:10px;height:10px;border-radius:50%;background:${h.comp>=75?'var(--green)':h.comp>=40?'var(--yellow)':'var(--red)'};flex-shrink:0;margin-top:5px;box-shadow:0 0 10px currentColor"></div>
      <div style="flex:1">
        <div class="fb fw gap-6"><span class="f-13 semi display">${fd(h.date)}</span><div class="fc gap-6 fw">${bdg(`${h.comp}% complete`,'var(--green)','var(--green-glow)','rgba(16,211,115,.3)')}${bdg(`${h.acc}% accuracy`,'var(--blue)','var(--blue-glow)','rgba(59,157,255,.3)')}${h.ov>0?bdg(`${h.ov} overdue`,'var(--red)','var(--red-glow)','rgba(255,61,95,.3)'):''}</div></div>
        <div class="f-11 c-muted mt-6">${h.done}/${h.tot} tasks · Day score: ${h.ds}%</div>
      </div>
    </div>`).join('')}
  </div>`;
}

      </div>
      ${p.desc?`<div class="f-12 c-muted mb-14">${esc(p.desc)}</div>`:''}
      <div class="mb-12"><div class="fb f-11 c-muted mb-6"><span>Progress</span><span class="bold" style="color:var(--text)">${p.progress}%</span></div>${pbar(p.progress,p.status==='Done'?'var(--green)':'var(--accent-grad)',7)}</div>
      <div class="fb f-11 fw gap-6"><span><span class="c-muted">Budget:</span> <span class="bold">$${(p.budget||0).toLocaleString()}</span><span style="color:${ov?'var(--red)':'var(--muted)'};margin-left:6px">· Spent: $${(p.spent||0).toLocaleString()}</span>${ov?` ${bdg('Over!','var(--red)','var(--red-glow)','rgba(255,61,95,.3)')}`:''}</span><span class="c-muted">${fd(p.deadline)}</span></div>
    </div>`}).join('')}
  </div>`;
}

// ── FINANCE ───────────────────────────────────────────────────────────────────
function gFin(){return ls.g('fin',DF)}
function sFin(f){ls.s('fin',f)}
function calcFin(){
  const fin=gFin(),md=fin.months[FM]||{};
  const gwe=md.gws?Object.entries(md.gws):[];
  const gwU=gwe.reduce((s,[,v])=>s+(v.usd||0),0),gwB=gwe.reduce((s,[,v])=>s+(v.bdt||0),0);
  const rate=md.rate||115,calcBDT=(md.saleUSD||0)*rate;
  const saleBDT=md.saleBDT||calcBDT;
  const tExp=(md.expense||0)+(md.advance||0)+(md.salAdv||0);
  const net=saleBDT+(md.prevMonth||0)-tExp;
  const grandT=(gwU*rate)+gwB;
  return{md,gwU,gwB,rate,calcBDT,saleBDT,tExp,net,grandT};
}
function uFin(k,v){const fin=gFin();fin.months[FM]={...fin.months[FM]||{},[k]:+v||0};sFin(fin)}
function updateGateways(){
  const fin=gFin();const md=fin.months[FM]||{};const gws={...md.gws};
  GWS.forEach(gw=>{
    const id_=gw.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
    const u=document.getElementById('gw_u_'+id_), b=document.getElementById('gw_b_'+id_);
    if(u||b)gws[gw]={usd:+(u?u.value:0)||0,bdt:+(b?b.value:0)||0};
  });
  fin.months[FM]={...md,gws};sFin(fin);rp();
}
function addMonth(){const m=prompt('Enter month (YYYY-MM):');if(!m)return;const fin=gFin();if(!fin.months[m]){fin.months[m]={saleUSD:0,saleBDT:0,rate:115,expense:0,advance:0,salAdv:0,prevMonth:0,gws:Object.fromEntries(GWS.map(g=>[g,{usd:0,bdt:0}]))};sFin(fin)}FM=m;rp()}
function recalc(){const fin=gFin();const md=fin.months[FM]||{};const calcBDT=(md.saleUSD||0)*(md.rate||115);fin.months[FM]={...md,saleBDT:calcBDT};sFin(fin);rp()}

function rFin(){
  const fin=gFin(),months=Object.keys(fin.months);
  const{md,gwU,gwB,rate,calcBDT,saleBDT,tExp,net,grandT}=calcFin();
  const tabs=[['ov','Overview'],['gw','Gateways'],['sum','Summary']];
  const hdr=`<div class="fb mb-18 fw gap-10">
    <div class="fc gap-6">${tabs.map(([k,l])=>`<button onclick="FT='${k}';rp()" class="radio-pill ${FT===k?'on':''}">${l}</button>`).join('')}</div>
    <div class="fc gap-8">
      <select class="inp" style="width:130px" onchange="FM=this.value;rp()">${months.map(m=>`<option${m===FM?' selected':''}>${m}</option>`).join('')}</select>
      <button class="btn btn-ghost btn-sm" onclick="addMonth()">+ Month</button>
    </div>
  </div>`;

  if(FT==='ov')return hdr+`
  <div class="g-4 mb-16">
    ${[{l:'Sale USD',v:nf(md.saleUSD,'$'),c:'var(--blue)',ic:'$'},{l:'Sale BDT',v:nf(saleBDT,'৳'),c:'var(--green)',ic:'৳'},{l:'Expenses',v:nf(tExp,'৳'),c:'var(--red)',ic:'↓'},{l:'Net Balance',v:nf(net,'৳'),c:net>=0?'var(--green)':'var(--red)',ic:'='}].map(x=>`
    <div class="stat-card"><div class="stat-label"><span class="stat-icon">${x.ic}</span>${x.l}</div><div class="stat-val" style="color:${x.c};font-size:22px">${x.v}</div></div>`).join('')}
  </div>
  <div class="card">
    <div class="card-title">Monthly Inputs</div>
    <div class="g-3" style="gap:12px">
      ${[{l:'Total Sale (USD)',k:'saleUSD',v:md.saleUSD||0},{l:'USD → BDT Rate',k:'rate',v:md.rate||115},{l:'Total Sale (BDT)',k:'saleBDT',v:md.saleBDT||0},{l:'Monthly Expenses (BDT)',k:'expense',v:md.expense||0},{l:'Advance Payment (BDT)',k:'advance',v:md.advance||0},{l:'Salary Advance (BDT)',k:'salAdv',v:md.salAdv||0},{l:'Previous Month (BDT)',k:'prevMonth',v:md.prevMonth||0}].map(f=>`<div><label class="il">${f.l}</label><input class="inp" type="number" value="${f.v}" onchange="uFin('${f.k}',this.value)"/></div>`).join('')}
    </div>
    <div class="fc gap-10 mt-16 fw">
      <button class="btn btn-primary" onclick="recalc()">🔄 Auto-Calculate BDT</button>
      <div style="padding:10px 14px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:var(--r-sm);font-size:12px;color:var(--accent);font-weight:600">${nf(md.saleUSD||0,'$')} × ${md.rate||115} = ${nf(calcBDT,'৳')}</div>
    </div>
  </div>`;

  if(FT==='gw')return hdr+`
  <div class="card" style="padding:0;overflow:hidden">
    <div style="padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;flex:1;min-width:280px">
        <span class="stat-label" style="margin:0">Gateway</span>
        <span class="stat-label" style="margin:0">USD ($)</span>
        <span class="stat-label" style="margin:0">BDT (৳)</span>
      </div>
      <button onclick="updateGateways()" class="btn btn-primary">✓ Update & Calculate</button>
    </div>
    <div style="padding:4px 22px">
      ${GWS.map(gw=>{
        const v=md.gws?.[gw]||{usd:0,bdt:0};
        const id_=gw.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
        return `<div class="gwr">
          <span class="f-12 semi">${gw}</span>
          <input id="gw_u_${id_}" class="inp" type="number" value="${v.usd||''}" placeholder="0" style="padding:7px 9px;font-size:12px"/>
          <input id="gw_b_${id_}" class="inp" type="number" value="${v.bdt||''}" placeholder="0" style="padding:7px 9px;font-size:12px"/>
        </div>`;
      }).join('')}
    </div>
    <div style="padding:16px 22px 4px">
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;padding:12px 0;border-top:2px solid var(--border);font-weight:700;font-size:13px">
        <span class="c-text2">Sub Total</span>
        <span style="color:var(--blue)">$${gwU.toLocaleString()}</span>
        <span style="color:var(--green)">৳${gwB.toLocaleString()}</span>
      </div>
      <div style="background:var(--accent-grad);border-radius:var(--r-md);padding:18px 20px;margin:8px 0 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(99,102,241,.35)">
        <div style="position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(255,255,255,.15),transparent 60%);pointer-events:none"></div>
        <div style="position:relative">
          <div class="stat-label" style="color:rgba(255,255,255,.85);margin-bottom:4px">Grand Total (BDT)</div>
          <div class="f-11" style="color:rgba(255,255,255,.75)">($${gwU.toLocaleString()} × ${rate}) + ৳${gwB.toLocaleString()}</div>
        </div>
        <div class="display x-bold" style="font-size:28px;color:#fff;letter-spacing:-0.8px;position:relative">৳${grandT.toLocaleString()}</div>
      </div>
    </div>
  </div>`;

  return hdr+`
  <div class="card">
    <div class="card-title">Summary — ${FM}</div>
    ${[{l:'Total Sale (USD)',v:nf(md.saleUSD,'$'),c:'var(--blue)'},{l:'Total Sale (BDT)',v:nf(saleBDT,'৳'),c:'var(--green)'},{l:'USD → BDT Rate',v:`${rate} BDT / $1`,c:'var(--text-2)'},{l:'Gateway Collections (USD)',v:nf(gwU,'$'),c:'var(--blue)'},{l:'Gateway Collections (BDT)',v:nf(gwB,'৳'),c:'var(--green)'},{l:'Gateway Grand Total (BDT)',v:nf(grandT,'৳'),c:'var(--accent)'},{l:'Monthly Expenses',v:nf(md.expense,'৳'),c:'var(--red)'},{l:'Advance Payment',v:nf(md.advance,'৳'),c:'var(--red)'},{l:'Salary Advance',v:nf(md.salAdv,'৳'),c:'var(--red)'},{l:'Previous Month Balance',v:nf(md.prevMonth,'৳'),c:'var(--text-2)'}].map(r=>`
    <div class="fb" style="padding:11px 0;border-bottom:1px solid var(--border);font-size:12.5px">
      <span class="c-text2 semi">${r.l}</span><span class="bold" style="color:${r.c}">${r.v}</span>
    </div>`).join('')}
    <div class="fb" style="padding:16px 0 0;font-size:16px;font-weight:800">
      <span class="display">Net Balance (BDT)</span><span class="display" style="color:${net>=0?'var(--green)':'var(--red)'}">৳${net.toLocaleString()}</span>
    </div>
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function rDash(){
  const tasks=gTasks().filter(t=>isActiveToday(t));
  const done=tasks.filter(t=>isDone(t)).length,tot=tasks.length;
  const high=tasks.filter(t=>t.priority==='High'&&!isDone(t)).length;
  const ov=tasks.filter(t=>t.deadline&&t.deadline<td()&&!isDone(t)).length;
  const blocks=gBlocks(),bDone=blocks.filter(b=>b.bs==='Completed').length;
  const ds=blocks.length?pc(bDone,blocks.length):0,dsc=ds>=75?'var(--green)':ds>=40?'var(--yellow)':'var(--red)';
  const hr=new Date().getHours(),gr=hr<12?'morning':hr<17?'afternoon':'evening';
  const name=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  return `
  <div class="mb-24">
    <div class="display x-bold" style="font-size:28px;letter-spacing:-1px">Good ${gr}<span class="grad-text">.</span></div>
    <div class="f-12 c-muted mt-6">${name}</div>
  </div>
  <div class="g-4 mb-16">
    <div class="stat-card accent" style="position:relative">
      <div class="stat-label"><span class="stat-icon">⚡</span>Completion</div>
      <div class="stat-val">${pc(done,tot)}%</div>
      <div class="stat-sub">${done}/${tot} tasks</div>
    </div>
    <div class="stat-card"><div class="stat-label"><span class="stat-icon">⏱</span>Day Score</div><div class="stat-val" style="color:${dsc}">${ds}%</div><div class="stat-sub">${bDone}/${blocks.length} blocks</div></div>
    <div class="stat-card"><div class="stat-label"><span class="stat-icon">🔥</span>High Priority</div><div class="stat-val" style="color:var(--red)">${high}</div><div class="stat-sub">need attention</div></div>
    <div class="stat-card"><div class="stat-label"><span class="stat-icon">⚠</span>Overdue</div><div class="stat-val" style="color:${ov>0?'var(--red)':'var(--green)'}">${ov}</div><div class="stat-sub">past due</div></div>
  </div>
  <div class="g-2 mb-16">
    <div class="card">
      <div class="card-title">Task Progress</div>
      ${pbar(pc(done,tot),'var(--accent-grad)',10)}<div class="fb f-11 c-muted mt-10 mb-14"><span>${done} done</span><span>${tot-done} remaining</span></div>
      ${[{l:'Todo',v:tasks.filter(t=>!isDone(t)&&t.status!=='In Progress'&&t.status!=='Blocked').length,c:'var(--muted)'},{l:'In Progress',v:tasks.filter(t=>t.status==='In Progress'&&!isDone(t)).length,c:'var(--blue)'},{l:'Done',v:done,c:'var(--green)'},{l:'Blocked',v:tasks.filter(t=>t.status==='Blocked'&&!isDone(t)).length,c:'var(--red)'}].map(r=>`<div class="fb f-12 mb-10"><span class="c-text2 semi">${r.l}</span><span class="bold" style="color:${r.c}">${r.v}</span></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Today's Blocks</div>
      ${blocks.slice(0,5).map(b=>`<div class="fc gap-10" style="padding:9px 0;border-bottom:1px solid var(--border)"><div style="width:4px;height:32px;border-radius:99px;background:${b.color};flex-shrink:0;box-shadow:0 0 12px ${b.color}"></div><div style="flex:1;overflow:hidden"><div class="f-12 semi te">${esc(b.title)}</div><div class="f-10 c-muted">${fmtHour(b.hour)} · ${b.dur}h</div></div>${bsb(b.bs,b.id)}</div>`).join('')}
      ${blocks.length===0?'<div class="f-12 c-muted">No blocks yet.</div>':''}
    </div>
  </div>
  <div class="card">
    <div class="card-title">High Priority Tasks</div>
    ${tasks.filter(t=>t.priority==='High'&&!isDone(t)).slice(0,4).map(t=>`<div class="fb gap-10 fw" style="padding:11px 0;border-bottom:1px solid var(--border)"><span class="f-13 semi te" style="flex:1">${esc(t.title)}</span><div class="fc gap-8">${sb(t.status)}<span class="f-11 c-muted">${fd(t.deadline)}</span></div></div>`).join('')}
    ${high===0?'<div class="c-green f-12 semi">✓ All caught up!</div>':''}
  </div>`;
}

// ── RENDER
function rp(){
  const el=$('pg');if(!el)return;
  switch(CP){
    case'dash':el.innerHTML=rDash();break;
    case'tasks':el.innerHTML=rTasks();break;
    case'routine':el.innerHTML=rRoutine();break;
    case'perf':el.innerHTML=rPerf();break;
    case'team':el.innerHTML=rTeam();break;
    case'proj':el.innerHTML=rProj();break;
    case'fin':el.innerHTML=rFin();break;
  }
  uBadges();
}

// ── INIT
window.addEventListener('DOMContentLoaded',()=>{
  $('pg-date').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  rp();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
});

Object.assign(window,{go,tSB,cSB,doAction,cM,oTM,svTask,delTask,cTS,setRecur,setRecurDay,oBM,svBlock,cBS,delBlock,oMM,svMember,oAT,svAT,cTTS,setRat,oPM,svProj,uFin,updateGateways,addMonth,recalc,svSnap,rp,gTasks,sTasks,gTeam,sTeam,gTT,sTT,gProj,sProj,gFin,sFin,gBlocks,sBlocks,$,TF,TQ,RV,FT,FM,TV,SMI,isDone,isActiveToday});
</script>
